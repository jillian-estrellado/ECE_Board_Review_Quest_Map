/* Minimal mode overrides */
:root{
  --bg:#0f172a; --card:#111827; --soft:#1f2937; --text:#f8fafc; --muted:#cbd5e1;
  --accent:#38bdf8; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --border:#334155;
  --purple:#a78bfa; --gold:#facc15; --pink:#f9a8d4; --panel:#111827; --darkPanel:#0b1120;
}
body{background:var(--bg)!important;color:var(--text);font-size:14px}
.app{max-width:1120px;padding:18px 14px 46px}
.hero{margin-bottom:12px;gap:8px}.eyebrow{display:none}
h1{font-size:clamp(24px,4vw,38px)!important;color:var(--text)!important;letter-spacing:-.03em}
.subtitle{font-size:14px;line-height:1.45;max-width:780px}
.layout{grid-template-columns:260px 1fr;gap:14px}
.panel,.card,.quest,.chapter,.quizCard,.callout,.notice,.copyBox,.uploadBox,.resourceCheck{
  background:var(--card)!important;border:1px solid var(--border)!important;box-shadow:none!important;border-radius:14px!important}
.panel{padding:14px}.sidebar{top:10px}
.chapterBtn,.tab,.quizOption,button.primary,button.secondary,button.danger,.input,.textarea{border-radius:10px!important;box-shadow:none!important}
.chapterBtn{padding:10px;background:var(--darkPanel)!important}.chapterBtn.active{background:#172033!important;border-color:var(--accent)!important}.chapterBtn.done{border-color:var(--good)!important}
.tabs{gap:6px;margin-bottom:10px}.tab{padding:8px 10px;font-size:13px;background:var(--darkPanel)!important}.tab.active,button.primary{background:var(--accent)!important;color:#082f49!important}
.courseHead h2,.contentHead h2{font-size:clamp(20px,3vw,28px)!important;color:var(--text)!important}
.card h3,.lessonText h3,.chapterHead h3{color:var(--text)!important}
.small,.footerNote,.card p,.card li{font-size:13px;line-height:1.42}
.badge,.tag,.pill{font-size:11px;padding:4px 7px;border-radius:999px}
.badge.good{background:rgba(34,197,94,.12);color:#86efac}.badge.warn{background:rgba(245,158,11,.12);color:#fcd34d}.badge.bad{background:rgba(239,68,68,.12);color:#fca5a5}.badge.purple,.tag.purple{background:rgba(167,139,250,.12);color:#ddd6fe}

.questList,.taskList,.resourceList{gap:8px}.quest{padding:12px!important;margin-bottom:8px!important}.questTop,.headrow,.contentHead,.chapterHead{gap:8px}.questTitle{font-size:15px!important;line-height:1.3}.questDetails{margin-top:8px}
.formula,.answerBox,.questionBox,.practiceBox,.notesBox{border-radius:10px!important;padding:10px!important}.textarea{min-height:74px;font-size:13px}
button.primary,button.secondary,button.danger{padding:9px 11px;font-size:13px}.actions,.miniNav{gap:8px;margin-top:10px}

<script>
const STORAGE_KEY='ece_board_quest_map_2026_v1';

const pinoyResources=[
 {group:'Mathematics',title:'Differential Calculus — Limits and Derivatives',url:'https://pinoybix.org/2015/08/mcqs-in-differential-calculus-limits-derivatives-part1.html',match:['differential calculus','limits','derivatives']},
 {group:'Mathematics',title:'Differential Calculus — Maxima/Minima and Time Rates',url:'https://pinoybix.org/2015/08/mcqs-in-differential-calculus-maxima-minima-time-rates-part1.html',match:['differential calculus','maxima','minima','time rates','related rates']},
 {group:'Mathematics',title:'Integral Calculus',url:'https://pinoybix.org/2015/08/mcqs-in-integral-calculus-part1.html',match:['integral calculus','integration','area','volume by integration']},
 {group:'Mathematics',title:'Differential Equations',url:'https://pinoybix.org/2015/08/mcqs-in-differential-equations-part1.html',match:['differential equations','ode','laplace']},
 {group:'Mathematics',title:'Advanced Engineering Math',url:'https://pinoybix.org/2015/08/mcqs-in-advanced-engineering-math-part1.html',match:['advanced engineering math','complex numbers','fourier','pde','partial differential equations','numerical methods','vector analysis','matrices','power series','bessel','legendre']},
 {group:'Electronics Engineering',title:'Electrical Circuit MCQ Series',url:'https://pinoybix.org/2018/05/mcq-in-electrical-circuit-series.html',match:['dc circuits','ac circuits','electrical circuit','network theorems','resistors','capacitors','inductors','transient','rlc','power factor','phasor']},
 {group:'Electronics Engineering',title:'Electronic Circuits / Analysis / Design Series',url:'https://pinoybix.org/2018/05/mcq-in-electronic-circuits-series.html',match:['electronic circuits','diode','bjt','fet','mosfet','amplifier','oscillator','filter','op-amp','rectifier','biasing']},
 {group:'Electronics Engineering',title:'Control Systems MCQ',url:'https://pinoybix.org/2022/08/mcq-in-control-systems-part-1-engineering-board-exam.html',match:['control systems','feedback','stability','root locus','transfer function','block diagram','signal flow']},
 {group:'Electronics Engineering',title:'Sensors and Transducers MCQ',url:'https://pinoybix.org/2022/11/mcq-in-sensors-and-transducers-part-1-ece-board-exam.html',match:['sensors','transducers','data acquisition','daq','interfacing']},
 {group:'Electronics Engineering',title:'Engineering Electromagnetics MCQ',url:'https://pinoybix.org/2022/06/mcq-in-engineering-electromagnetics-part-1-ece-board-exam.html',match:['electromagnetics','electric field','magnetic field','maxwell','coulomb','gauss']},
 {group:'EST / Communications',title:'Acoustics MCQ Series',url:'https://pinoybix.org/2015/01/questions-and-answers-in-acoustics.html',match:['acoustics','audio','sound','decibel']},
 {group:'EST / Communications',title:'Antenna MCQ Series',url:'https://pinoybix.org/2015/01/questions-and-answers-in-antennas-series.html',match:['antenna','antennas','radiation','wave propagation']},
 {group:'EST / Communications',title:'Digital and Data Communication Networks MCQ Series',url:'https://pinoybix.org/2015/01/questions-and-answers-in-digital-and-data-communications.html',match:['digital communications','data communications','network','networks','osi','tcp','cryptography','data security','information theory','line coding']},
 {group:'EST / Communications',title:'Microwave Communications MCQ Series',url:'https://pinoybix.org/2020/05/mcq-in-microwave-communications-series.html',match:['microwave','waveguide','radar']},
 {group:'EST / Communications',title:'Modulation MCQ Series',url:'https://pinoybix.org/2015/01/questions-and-answers-in-modulation.html',match:['modulation','amplitude modulation','frequency modulation','phase modulation','am','fm','pm']},
 {group:'EST / Communications',title:'Satellite Communications MCQ Series',url:'https://pinoybix.org/2020/05/mcq-in-satellite-communications-series.html',match:['satellite','link budget']},
 {group:'GEAS',title:'Engineering Economics MCQ Series',url:'https://pinoybix.org/2015/03/questions-and-answers-in-engineering-economics.html',match:['engineering economics','economics','interest','annuity','present worth','future worth','depreciation']},
 {group:'GEAS',title:'Engineering Management MCQ Series',url:'https://pinoybix.org/2015/03/questions-and-answers-in-engineering-management.html',match:['engineering management','management','planning','organizing','leading','controlling','marketing','finance function','operations']},
 {group:'GEAS',title:'Engineering Laws and Ethics MCQ Series',url:'https://pinoybix.org/2015/03/questions-and-answers-in-engineering-laws-and-ethics.html',match:['laws','ethics','ra 9292','contracts','safety','standards']},
 {group:'GEAS',title:'Engineering Materials MCQ Series',url:'https://pinoybix.org/2020/01/mcq-in-engineering-materials-series.html',match:['materials','materials science','polymers','composites','dielectric','magnetic','optical','thermal','crystalline']},
 {group:'GEAS',title:'College Physics MCQ Series',url:'https://pinoybix.org/2015/03/questions-and-answers-in-physics-series.html',match:['physics','mechanics','kinematics','dynamics','waves','optics','thermodynamics','electricity and magnetism']},
 {group:'GEAS',title:'Environmental Engineering MCQ',url:'https://pinoybix.org/2022/07/mcq-in-environmental-engineering-part-1.html',match:['environmental','environmental science','environmental engineering','sustainable','impact assessment','eia','ecology']}
];
function normText(x){return String(x||'').toLowerCase().replace(/[^a-z0-9]+/g,' ');} 
function resourceId(r){return btoa(unescape(encodeURIComponent(r.url))).replace(/=+$/,'');}
function practiceMatches(q){
 const hay=normText(q.subjectTitle+' '+q.chapter+' '+q.item);
 let links=[];
 pinoyResources.forEach(r=>{
   const groupOk = (r.group==='Mathematics' && q.subject==='math') ||
                   (r.group==='Electronics Engineering' && q.subject==='ee') ||
                   (r.group==='GEAS' && q.subject==='geas') ||
                   (r.group==='EST / Communications' && q.subject==='est') ||
                   (!['Mathematics','Electronics Engineering','GEAS','EST / Communications'].includes(r.group));
   const hit=groupOk && (r.match||[]).some(m=>hay.includes(normText(m)));
   if(hit && !links.some(x=>x.url===r.url))links.push(r);
 });
 return links.slice(0,3);
}
function practiceLinkHTML(q){
 const arr=practiceMatches(q);
 if(!arr.length){return `<div class="noPractice">No exact PinoyBIX practice page confirmed for this exact topic yet. Use your review-center notes/question bank for this one.</div>`;}
 return `<div class="practicePanel"><div class="practiceTitle">Exact PinoyBIX practice for this topic</div>${arr.map(r=>{const rid=resourceId(r);return `<label class="practiceItem"><input type="checkbox" class="practiceDone" data-rid="${rid}" ${state.practiceDone&&state.practiceDone[rid]?'checked':''}/><span><a class="practiceLink" href="${r.url}" target="_blank" rel="noopener">${r.title}</a></span></label>`;}).join('')}</div>`;
}
function videoQuery(q){
 let base=(q.subjectTitle+' '+q.chapter+' '+q.item).replace(/\s+/g,' ').trim();
 return base+' ECE board exam tutorial';
}
function videoId(q){return 'vid_'+q.id;}
function videoRefresherHTML(q){
 const vid=videoId(q);
 const url='https://www.youtube.com/results?search_query='+encodeURIComponent(videoQuery(q));
 return `<div class="practicePanel videoPanel"><div class="practiceTitle">🎥 Video refresher</div><label class="practiceItem"><input type="checkbox" class="videoDone" data-vid="${vid}" ${state.videoDone&&state.videoDone[vid]?'checked':''}/><span><a class="practiceLink" href="${url}" target="_blank" rel="noopener">Open tutorial search</a><span class="small"> — watch one short refresher, then solve the quest problem.</span></span></label></div>`;
}
function topicNotesHTML(q){
 const val=((state.topicNotes&&state.topicNotes[q.id])||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
 return `<div class="topicNotes"><label>Notes for this topic</label><textarea class="topicNoteBox" data-id="${q.id}" placeholder="Write formula traps, PinoyBIX mistakes, memory hooks, or what to repeat next time...">${val}</textarea></div>`;
}
function escHTML(x){return String(x).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function problemFor(q){
 const hay=(q.subjectTitle+' '+q.chapter+' '+q.item).toLowerCase();
 let p=null;
 const mk=(title, problem, answer, hint='')=>({title,problem,answer,hint});
 if(q.subject==='math'){
   if(hay.includes('limits')||hay.includes('continuity')||hay.includes('functions')) p=mk('Board-style drill', 'Evaluate the limit: lim(x→2) [(x² - 4)/(x - 2)]. State whether the function can be made continuous at x = 2.', 'Limit = 4. Yes, define f(2)=4 to remove the discontinuity.', 'Factor x²−4 as (x−2)(x+2).');
   else if(hay.includes('derivatives')||hay.includes('differentiation')) p=mk('Board-style drill', 'For y = x³ − 6x² + 9x + 2, find the critical points and identify whether each is a local maximum or minimum.', 'y′=3x²−12x+9=3(x−1)(x−3). y″=6x−12. At x=1: y″<0, local max. At x=3: y″>0, local min.', 'Derivative for critical points, second derivative for classification.');
   else if(hay.includes('parametric')) p=mk('Board-style drill', 'Given x=t²+1 and y=t³−3t, find dy/dx at t=2.', 'dy/dx=(dy/dt)/(dx/dt)=(3t²−3)/(2t). At t=2, dy/dx=9/4=2.25.', 'Differentiate x and y separately with respect to t.');
   else if(hay.includes('partial')) p=mk('Board-style drill', 'For z=x²y+3xy², find ∂z/∂x and evaluate it at x=2, y=1.', '∂z/∂x=2xy+3y². At (2,1), value = 4+3=7.', 'Treat y as constant when differentiating with respect to x.');
   else if(hay.includes('integration')||hay.includes('integral')) p=mk('Board-style drill', 'Evaluate ∫₀² (3x² − 4x + 1) dx.', 'Antiderivative: x³ − 2x² + x. From 0 to 2: 8−8+2=2.', 'Integrate term by term, then apply upper minus lower.');
   else if(hay.includes('improper')) p=mk('Board-style drill', 'Determine whether ∫₁∞ 1/x² dx converges. If it converges, find its value.', 'It converges. ∫₁∞ x⁻² dx = [-1/x]₁∞ = 1.', 'Replace infinity with a limit.');
   else if(hay.includes('multiple')) p=mk('Board-style drill', 'Evaluate ∬R (x+y) dA over 0≤x≤2 and 0≤y≤1.', '∫₀²∫₀¹(x+y)dy dx = ∫₀²(x+1/2)dx = 3.', 'Inner integral first, then outer integral.');
   else if(hay.includes('ode')||hay.includes('differential equations')) p=mk('Board-style drill', 'Solve dy/dx = 3x² with y(0)=2.', 'y=x³+C. Using y(0)=2 gives C=2, so y=x³+2.', 'Integrate both sides with respect to x.');
   else if(hay.includes('laplace')) p=mk('Board-style drill', 'Find the Laplace transform of f(t)=3e^(−2t)+4sin(5t).', 'L{f}=3/(s+2)+20/(s²+25).', 'Use linearity, L{e^(at)}=1/(s−a), and L{sin bt}=b/(s²+b²).');
   else if(hay.includes('complex')) p=mk('Board-style drill', 'Convert 3 − j4 to polar form.', 'Magnitude = 5. Angle = atan(−4/3)=−53.13°. Polar form = 5∠−53.13°.', 'Magnitude is sqrt(a²+b²).');
   else if(hay.includes('fourier')) p=mk('Board-style drill', 'A periodic signal has fundamental frequency 60 Hz. What are the frequencies of the 3rd, 5th, and 7th harmonics?', '180 Hz, 300 Hz, and 420 Hz.', 'nth harmonic = n times the fundamental.');
   else if(hay.includes('numerical')) p=mk('Board-style drill', 'Using the trapezoidal rule with h=1, estimate ∫₀² x² dx using x=0,1,2.', 'Approximation = h/2[f(0)+2f(1)+f(2)] = 1/2[0+2(1)+4]=3.', 'This is intentionally not exact; exact value is 8/3.');
   else if(hay.includes('probability')||hay.includes('sampling')||hay.includes('distributions')) p=mk('Board-style drill', 'A component has failure probability 0.02. In 10 independent components, approximate the probability that exactly one fails.', 'C(10,1)(0.02)(0.98)^9 ≈ 0.1667.', 'Use the binomial formula.');
   else if(hay.includes('statistical intervals')||hay.includes('estimation')) p=mk('Board-style drill', 'A sample of n=36 has mean 80 and known σ=12. Find the 95% confidence interval for the population mean.', 'Margin = 1.96(12/√36)=3.92. CI = 76.08 to 83.92.', 'Known sigma means use z, not t.');
   else if(hay.includes('hypothesis')) p=mk('Board-style drill', 'Test H₀: μ=50 vs H₁: μ>50. Given x̄=53, σ=6, n=36. Compute z and decide at α=0.05.', 'z=(53−50)/(6/√36)=3. Since 3>1.645, reject H₀.', 'Right-tailed z test.');
   else if(hay.includes('regression')||hay.includes('correlation')) p=mk('Board-style drill', 'For x=[1,2,3] and y=[2,4,5], estimate the least-squares line y=a+bx.', 'b=1.5, a≈0.667. Line: y≈0.667+1.5x.', 'Compute b=Sxy/Sxx, then a=ȳ−bx̄.');
   else if(hay.includes('vector')||hay.includes('gradient')||hay.includes('divergence')||hay.includes('curl')||hay.includes('directional')) p=mk('Board-style drill', 'For scalar field φ=x²y+yz, find ∇φ at point (1,2,3).', '∇φ=(2xy, x²+z, y). At (1,2,3): (4,4,2).', 'Gradient is partial derivatives in x, y, z.');
   else if(hay.includes('green')||hay.includes('stokes')||hay.includes('divergence theorem')) p=mk('Board-style drill', 'For vector field F=(x,y,z), compute ∇·F.', '∇·F = ∂x/∂x + ∂y/∂y + ∂z/∂z = 3.', 'Divergence measures source strength per volume.');
   else if(hay.includes('z-transform')) p=mk('Board-style drill', 'Find the Z-transform of x[n]=(0.5)^n u[n].', 'X(z)=1/(1−0.5z⁻¹), ROC |z|>0.5.', 'Use the geometric series.');
   else if(hay.includes('convolution')||hay.includes('correlation')) p=mk('Board-style drill', 'Compute the discrete convolution of x=[1,2] and h=[3,4].', 'y=[3,10,8].', 'Multiply and slide: y0=1·3, y1=1·4+2·3, y2=2·4.');
   else if(hay.includes('pole')||hay.includes('zero')) p=mk('Board-style drill', 'For H(s)=(s+2)/(s²+5s+6), find the zero and poles.', 'Zero: s=−2. Poles: s=−2 and s=−3.', 'Set numerator and denominator to zero.');
   else if(hay.includes('transient')||hay.includes('block')||hay.includes('signal flow')) p=mk('Board-style drill', 'A first-order system has transfer function G(s)=5/(s+2). Find the time constant.', 'Time constant τ=1/2=0.5 s.', 'For K/(s+a), τ=1/a.');
   else p=mk('Board-style drill', 'A complex number is z = 4 + j3. Find |z|, angle θ in degrees, and z² in rectangular form.', '|z|=5, θ=36.87°. z²=(4+j3)²=16+j24-9=7+j24. Trap: do not square magnitude and angle as if rectangular parts were independent.', 'Use rectangular operations for z²; use polar only when multiplying/dividing is easier.');
 }
 else if(q.subject==='ee'){
   if(hay.includes('resistive')||hay.includes('dc')||hay.includes('ohm')) p=mk('Circuit drill', 'A 12 V source is connected to R1=2 kΩ in series with R2=4 kΩ. Find total current and voltage across R2.', 'RT=6 kΩ. I=12/6000=2 mA. VR2=I·R2=8 V.', 'Series current is the same through all resistors.');
   else if(hay.includes('mesh')||hay.includes('node')) p=mk('Circuit drill', 'At a node, a 2 kΩ resistor goes to 10 V and a 3 kΩ resistor goes to ground. Find the node voltage using nodal analysis.', '(V−10)/2000 + V/3000 = 0. V=6 V.', 'Sum currents leaving the node.');
   else if(hay.includes('theorems')) p=mk('Circuit drill', 'Find the Thevenin resistance seen by a load if a 10 V ideal voltage source is in series with 2 kΩ and 3 kΩ resistors.', 'Turn off the ideal voltage source → short circuit. Rth=2 kΩ+3 kΩ=5 kΩ.', 'Voltage sources become shorts; current sources become opens.');
   else if(hay.includes('transient')) p=mk('Circuit drill', 'An RC circuit has R=10 kΩ and C=100 µF. Find the time constant and approximate time to reach 99% final value.', 'τ=RC=1 s. 99% settling ≈5τ=5 s.', 'For first-order RC/RL, use τ.');
   else if(hay.includes('ac')||hay.includes('impedance')||hay.includes('admittance')) p=mk('AC circuit drill', 'A 100 Ω resistor is in series with an inductor having XL=75 Ω. Find the magnitude of total impedance.', '|Z|=√(100²+75²)=125 Ω.', 'Series R-L impedance is R+jXL.');
   else if(hay.includes('resonance')) p=mk('AC circuit drill', 'Find the resonant frequency of an LC circuit with L=10 mH and C=1 µF.', 'f0=1/(2π√LC)=1/(2π√(10⁻²·10⁻⁶))≈1591.5 Hz.', 'Use SI units.');
   else if(hay.includes('power in ac')) p=mk('AC circuit drill', 'A load draws 5 A at 220 V with power factor 0.8 lagging. Find real power.', 'P=VIpf=220×5×0.8=880 W.', 'Single-phase real power.');
   else if(hay.includes('two-port')||hay.includes('transfer')) p=mk('Network drill', 'For a voltage divider with R1=3 kΩ on top and R2=1 kΩ to ground, find Vout/Vin.', 'Vout/Vin=R2/(R1+R2)=1/4=0.25.', 'Assume output is across R2 and unloaded.');
   else if(hay.includes('maxwell')||hay.includes('time-varying')) p=mk('Electromagnetics drill', 'A magnetic flux through a coil changes from 0.02 Wb to 0.005 Wb in 0.1 s. For N=100 turns, find induced emf magnitude.', '|e|=N|dΦ/dt|=100×0.015/0.1=15 V.', 'Faraday law; magnitude ignores sign.');
   else if(hay.includes('electric')||hay.includes('magnetic')||hay.includes('dielectric')) p=mk('Electromagnetics drill', 'Two charges +2 µC and +3 µC are separated by 0.5 m in air. Find the electrostatic force magnitude.', 'F=kq1q2/r² = 9×10⁹(2×10⁻⁶)(3×10⁻⁶)/0.25 = 0.216 N.', 'Use Coulomb law.');
   else if(hay.includes('diode')||hay.includes('wave shaping')) p=mk('Devices drill', 'A silicon diode with 0.7 V drop is in series with a 1 kΩ resistor and 5 V source. Find diode current.', 'I=(5−0.7)/1000=4.3 mA.', 'Assume forward biased silicon diode.');
   else if(hay.includes('bjt')||hay.includes('fet')) p=mk('Devices drill', 'A BJT has β=100 and base current of 40 µA. Estimate collector current in active region.', 'IC=βIB=100×40 µA=4 mA.', 'Check saturation only if supply/resistor data are given.');
   else if(hay.includes('multiplier')||hay.includes('power supplies')||hay.includes('regulation')) p=mk('Power supply drill', 'A full-wave rectifier has Vrms=12 V secondary. Estimate peak output before diode drops.', 'Vpeak=12√2≈16.97 V.', 'Then subtract diode drops only if asked.');
   else if(hay.includes('frequency response')) p=mk('Amplifier drill', 'An amplifier has lower cutoff 100 Hz and upper cutoff 100 kHz. Find the bandwidth.', 'BW=fH−fL=100,000−100=99,900 Hz.', 'Bandwidth is not the geometric mean.');
   else if(hay.includes('current mirror')||hay.includes('current source')) p=mk('Analog design drill', 'A BJT current mirror uses VCC=10 V, VBE≈0.7 V, and R=9.3 kΩ to set reference current. Estimate Iref.', 'Iref=(10−0.7)/9300≈1.0 mA.', 'Assume matched transistors and neglect base currents.');
   else if(hay.includes('operational amplifier')||hay.includes('op amp')||hay.includes('differential')) p=mk('Op-amp drill', 'An inverting amplifier has Rin=10 kΩ and Rf=100 kΩ with Vin=0.2 V. Find Vout.', 'Gain=−Rf/Rin=−10. Vout=−2.0 V.', 'Assume ideal op-amp and no saturation.');
   else if(hay.includes('feedback')||hay.includes('oscillator')||hay.includes('filters')) p=mk('Feedback/filter drill', 'A first-order RC low-pass filter uses R=1 kΩ and C=0.1 µF. Find cutoff frequency.', 'fc=1/(2πRC)=1/(2π×1000×0.1×10⁻⁶)≈1591.5 Hz.', 'Use farads, not microfarads.');
   else if(hay.includes('sensor')||hay.includes('transducer')||hay.includes('daq')) p=mk('Instrumentation drill', 'A temperature sensor outputs 10 mV/°C. What output voltage is expected at 75°C?', 'V=75×10 mV=750 mV=0.75 V.', 'Watch mV to V conversion.');
   else if(hay.includes('plc')||hay.includes('hvac')||hay.includes('bms')) p=mk('Controls integration drill', 'An HVAC sensor has range 0–50°C mapped to 0–10 V. What voltage corresponds to 30°C?', 'V=(30/50)×10=6 V.', 'Linear scaling.');
   else if(hay.includes('security')||hay.includes('surveillance')||hay.includes('lighting')||hay.includes('audio-video')) p=mk('Systems design drill', 'A CCTV camera consumes 8 W at 12 V. Estimate current required per camera and total current for 6 cameras.', 'Per camera I=P/V=8/12=0.667 A. Six cameras need about 4.0 A before safety margin.', 'For design, add margin after the base calculation.');
   else if(hay.includes('boolean')||hay.includes('logic')) p=mk('Logic drill', 'Simplify F = A·B + A·B\' .', 'F=A(B+B\')=A.', 'Use complement law B+B\'=1.');
   else if(hay.includes('sequential')||hay.includes('state')) p=mk('Logic drill', 'A 4-bit binary counter is clocked at 1 kHz. What is the frequency of the MSB output?', 'MSB divides by 16, so f=1000/16=62.5 Hz.', 'A 4-bit counter has 2⁴ states.');
   else if(hay.includes('microprocessor')||hay.includes('memory')||hay.includes('i/o')||hay.includes('instruction')||hay.includes('assembly')||hay.includes('microcontroller')) p=mk('Microprocessor drill', 'A memory subsystem uses a 16-bit address bus. How many unique byte-addressable memory locations can it address?', '2¹⁶=65,536 locations = 64 KB if each address stores 1 byte.', 'Address lines determine number of addresses.');
   else if(hay.includes('root locus')||hay.includes('stability')||hay.includes('steady-state')||hay.includes('frequency response')||hay.includes('lti')||hay.includes('system modeling')) p=mk('Control systems drill', 'For closed-loop characteristic equation s²+4s+8=0, find damping ratio ζ and natural frequency ωn.', 'Compare with s²+2ζωn s+ωn². ωn=√8=2.828 rad/s, ζ=4/(2ωn)=0.707.', 'Match coefficients carefully.');

   else if(hay.includes('electrostatics')||hay.includes('electricity')) p=mk('Physics drill', 'A 24 V source is connected across a 6 Ω resistor. Find current and power.', 'I=V/R=4 A. P=VI=96 W.', 'Ohm’s law first, then power.');
   else if(hay.includes('magnetism')||hay.includes('induction')||hay.includes('inductance')) p=mk('Physics drill', 'A 0.2 H inductor has current changing at 5 A/s. Find induced voltage magnitude.', 'v=L di/dt=0.2×5=1 V.', 'Inductor voltage opposes change; magnitude asked.');

   else if(hay.includes('transmission line')||hay.includes('matching')||hay.includes('smith')) p=mk('Transmission line drill', 'A line has characteristic impedance 50 Ω and load 100 Ω. Find reflection coefficient magnitude.', 'Γ=(ZL−Z0)/(ZL+Z0)=(100−50)/(100+50)=1/3≈0.333.', 'Pure resistance, so Γ is real.');

   else if(hay.includes('propagation')||hay.includes('power density')||hay.includes('field strength')) p=mk('Propagation drill', 'A transmitter radiates 100 W isotropically. Find power density at 10 m.', 'S=P/(4πr²)=100/(4π×100)=0.0796 W/m².', 'Isotropic means sphere area 4πr².');
   else if(hay.includes('antenna')) p=mk('Antenna drill', 'Find the approximate half-wave dipole length for 100 MHz. Use c=3×10⁸ m/s.', 'λ=c/f=3 m. Half-wave≈1.5 m before end-effect correction.', 'Convert MHz to Hz.');
   else if(hay.includes('waveguide')||hay.includes('fiber optics')) p=mk('Guided media drill', 'A fiber link has 0.4 dB/km loss over 25 km. Find total fiber attenuation.', '0.4×25=10 dB.', 'Add connector/splice losses only if given.');
   else if(hay.includes('bms')||hay.includes('hvac')||hay.includes('scada')||hay.includes('fire')||hay.includes('lighting')||hay.includes('surveillance')) p=mk('Applied systems drill', 'A 4–20 mA transmitter represents 0–100°C. What current corresponds to 75°C?', 'I=4 mA + (75/100)(16 mA)=16 mA.', 'Industrial signals often use 4–20 mA span.');

   else if(hay.includes('security')||hay.includes('cryptography')) p=mk('Security/crypto drill', 'A Caesar cipher shifts letters by +3. What is the ciphertext for ECE?', 'HFH.', 'E→H, C→F, E→H. This tests the idea, not modern security strength.');
   else if(hay.includes('tcp')||hay.includes('osi')||hay.includes('protocol')) p=mk('Networking drill', 'A payload is 1000 bytes and headers add 40 bytes. Find protocol overhead percentage relative to total frame size.', 'Total=1040 bytes. Overhead %=40/1040×100≈3.85%.', 'Use total transmitted size as denominator unless stated otherwise.');
 }
 return p;
}

let state={done:{},completedAt:{},lastReviewed:{},reviewCount:{},weak:{},practiceDone:{},videoDone:{},topicNotes:{},activityDates:{},daily:{},dailyTarget:3,subject:'all',view:'map',notes:''};
function load(){try{state={...state,...JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}}catch(e){}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function todayISO(){return new Date().toISOString();}
function dateOnly(iso){if(!iso)return '';try{return new Date(iso).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});}catch(e){return ''}}
function dayKey(d=new Date()){const x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10);}
function recordActivity(kind){const k=dayKey();state.activityDates=state.activityDates||{};state.daily=state.daily||{};state.activityDates[k]=true;state.daily[k]=state.daily[k]||{quests:0,reviews:0,practice:0};if(kind&&state.daily[k][kind]!==undefined)state.daily[k][kind]++;}
function currentStreak(){const dates=state.activityDates||{};let streak=0;let d=new Date();while(dates[dayKey(d)]){streak++;d.setDate(d.getDate()-1);}return streak;}
function levelTitle(level){if(level<3)return 'Cadet';if(level<6)return 'Circuit Hunter';if(level<10)return 'Signal Ranger';if(level<15)return 'Board Slayer';return 'ECE Final Boss';}
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}t.innerHTML=msg;t.classList.add('show');clearTimeout(showToast._timer);showToast._timer=setTimeout(()=>t.classList.remove('show'),3200);}
function motivationalLine(s){if(s.done===0)return 'Start tiny: one quest is enough to break the resistance.';if((state.daily?.[dayKey()]?.quests||0)>=(state.dailyTarget||3))return 'Daily target hit. Anything after this is bonus XP.';if(s.pct<10)return 'Early phase is supposed to feel slow. Build the habit first.';if(s.pct<40)return 'You are no longer starting. Protect the streak.';if(s.pct<75)return 'This is the grind zone. Weak topics are where points are hiding.';return 'Finish line mode: review due items and mock pressure matter most.';}
function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x;}
const REVIEW_INTERVALS=[1,3,7,14,30,60];
function nextReviewDate(qid){const start=state.lastReviewed?.[qid]||state.completedAt?.[qid];if(!start)return null;const count=state.reviewCount?.[qid]||0;const days=REVIEW_INTERVALS[Math.min(count,REVIEW_INTERVALS.length-1)];return addDays(start,days);}
function reviewStatus(qid){if(!state.done?.[qid])return {label:'Not finished',cls:'',due:false,soon:false};const due=nextReviewDate(qid);if(!due)return {label:'No date yet',cls:'soon',due:false,soon:true};const now=new Date();const ms=due-now;const days=Math.ceil(ms/86400000);if(ms<=0)return {label:'Review due now',cls:'due',due:true,soon:false};if(days<=2)return {label:'Review soon: '+dateOnly(due),cls:'soon',due:false,soon:true};return {label:'Next review: '+dateOnly(due),cls:'ok',due:false,soon:false};}
function reviewInfoHTML(q){if(!state.done?.[q.id])return '';const st=reviewStatus(q.id);return `<div class="reviewInfo"><span class="reviewPill ok">Finished: ${dateOnly(state.completedAt?.[q.id])||'today'}</span><span class="reviewPill ${st.cls}">${st.label}</span><span class="reviewPill">Reviews: ${state.reviewCount?.[q.id]||0}</span><button class="secondary reviewBtn">Reviewed</button></div>`;} 
function isNew(text){return newThreatKeywords.some(k=>text.toLowerCase().includes(k.toLowerCase()));}
function isCore(text){return coreKeywords.some(k=>text.toLowerCase().includes(k.toLowerCase()));}
function chapterWeight(subject, chapterTitle){let score=subject.weight; if(isNew(chapterTitle))score+=12; if(subject.weight===30)score+=8; if(/Circuit|Communications|Transmission|Antenna|Signals|Control|Microprocessor|Systems and Design/.test(chapterTitle))score+=8; return score;}
function makeQuests(){let q=[];subjects.forEach(s=>{s.chapters.forEach((ch,ci)=>{const [title,items]=ch;items.forEach((item,ii)=>{let text=title+' '+item;let nt=isNew(text), core=isCore(text);let xp= nt?24:(core?18:14); if(s.weight===30)xp+=4; q.push({id:`${s.id}-${ci}-${ii}`,subject:s.id,subjectTitle:s.title,weight:s.weight,chapter:title,item, xp, nt, core});});});});return q;}
const quests=makeQuests();
function getFiltered(){let term=document.getElementById('search')?.value.toLowerCase()||'';let filter=document.getElementById('filter')?.value||'all';return quests.filter(q=>{if(state.subject!=='all'&&q.subject!==state.subject)return false; let hay=(q.subjectTitle+' '+q.chapter+' '+q.item).toLowerCase(); if(term&&!hay.includes(term))return false; if(filter==='new'&&!q.nt)return false; if(filter==='core'&&!q.core)return false; if(filter==='weak'&&!state.weak[q.id])return false; if(filter==='undone'&&state.done[q.id])return false; if(filter==='done'&&!state.done[q.id])return false;
  if(filter==='due'&&!(state.done[q.id]&&reviewStatus(q.id).due))return false; return true;});}
function stats(){let done=quests.filter(q=>state.done[q.id]).length;let xp=quests.filter(q=>state.done[q.id]).reduce((a,q)=>a+q.xp,0);let level=Math.max(1,Math.floor(xp/350)+1);let today=state.daily?.[dayKey()]||{quests:0,reviews:0,practice:0};return{done,total:quests.length,xp,level,levelTitle:levelTitle(level),pct:quests.length?done/quests.length*100:0,streak:currentStreak(),today};}

 const qDone=s.today.quests||0;
 const due=quests.filter(q=>state.done[q.id]&&reviewStatus(q.id).due).length;
 const progress=Math.min(100,(qDone/target)*100);
 const nextText=due?`${due} due`:'next quest';
 el.innerHTML=`<div class="missionCard compactMission"><div class="missionHeader"><b>🔥 Today</b><span>${qDone}/${target}</span></div><div class="miniBar"><div style="width:${progress}%"></div></div><div class="missionMini"><span>🔥 ${s.streak}d</span><span>🔁 ${nextText}</span></div><div class="miniAction"><select id="targetSelect"><option value="1" ${target===1?'selected':''}>🌱 1</option><option value="3" ${target===3?'selected':''}>⚡ 3</option><option value="5" ${target===5?'selected':''}>🚀 5</option></select><button class="primary" id="nextActionBtn">Start</button></div></div>`;
 const sel=document.getElementById('targetSelect');if(sel)sel.onchange=e=>{state.dailyTarget=parseInt(e.target.value,10);save();render();};
 const btn=document.getElementById('nextActionBtn');if(btn)btn.onclick=()=>{state.view=due?'review':'quests';save();render();};
}
function renderSidebar(){let s=stats();doneCount.textContent=s.done;totalCount.textContent=s.total;xpCount.textContent=s.xp;levelCount.textContent=s.level;progressBar.style.width=s.pct+'%';renderMission(s);subjectList.innerHTML='';let all=document.createElement('button');all.className='subjectBtn '+(state.subject==='all'?'active':'');all.innerHTML=`<b>All Subjects <span>${s.done}/${s.total}</span></b><div class="small">Level ${s.level}: ${s.levelTitle} • ${s.streak}-day streak</div>`;all.onclick=()=>{state.subject='all';save();render();};subjectList.appendChild(all);subjects.forEach(sub=>{let qs=quests.filter(q=>q.subject===sub.id);let d=qs.filter(q=>state.done[q.id]).length;let b=document.createElement('button');b.className='subjectBtn '+(state.subject===sub.id?'active ':'')+(d===qs.length?'done':'');b.innerHTML=`<b>${sub.title} <span>${d}/${qs.length}</span></b><div class="small">${sub.weight}% • ${sub.priority}</div><div class="bar" style="margin-top:7px"><div style="width:${d/qs.length*100}%"></div></div>`;b.onclick=()=>{state.subject=sub.id;save();render();};subjectList.appendChild(b);});}
function renderMap(){const el=document.getElementById('view-map');let totalXP=quests.reduce((a,q)=>a+q.xp,0);const s=stats();const mission=`<div class="winCard"><b>Your job today is not to feel motivated.</b> It is to make one small visible win. Finish one quest, tick one practice link, or review one due item. Motivation usually arrives after action, not before it.</div>`;el.innerHTML=mission+`<div class="contentHead"><h2>Content Map First</h2><p class="small">Start here. The subject percentages are official weights; the detailed subtopics are used as a planning guide. New/expanded areas get special treatment, but the classic high-yield foundations still matter.</p></div><div class="mapGrid">${subjects.map(s=>{let qs=quests.filter(q=>q.subject===s.id);let xp=qs.reduce((a,q)=>a+q.xp,0);let nt=qs.filter(q=>q.nt).length;return `<div class="mapCard mapSubjectCard" data-sub="${s.id}"><h3>${s.title}</h3><p><b>${s.weight}% official weight</b> • ${qs.length} quests • ${xp} XP</p><p>${s.note}</p><div class="badges" style="margin-top:8px"><span class="badge ${s.weight===30?'bad':'warn'}">${s.priority}</span><span class="badge purple">${nt} New</span></div><button class="secondary mapOpenBtn" data-sub="${s.id}" style="margin-top:10px;padding:7px 10px;font-size:12px">Open quests</button></div>`}).join('')}</div><div class="callout"><b>Personal strategy because you failed before:</b> do not start by rereading everything. Your first phase should be diagnostic: finish the New audit, then hit Math/Circuits/Comms timed drills. Your risk is not intelligence; it is spreading effort equally across unequal topics.</div><div class="tableWrap"><table><thead><tr><th>Subject</th><th>Official weight</th><th>Quest allocation</th><th>New-threat pressure</th><th>Training instruction</th></tr></thead><tbody>${subjects.map(s=>{let qs=quests.filter(q=>q.subject===s.id);let nt=qs.filter(q=>q.nt).length;return `<tr><td><b>${s.title}</b></td><td>${s.weight}%</td><td>${qs.length} quests</td><td>${nt} flagged items</td><td>${s.note}</td></tr>`}).join('')}</tbody></table></div>`;
 document.querySelectorAll('.mapSubjectCard,.mapOpenBtn').forEach(elm=>elm.onclick=(e)=>{const sub=(e.currentTarget.dataset.sub);state.subject=sub;state.filter='all';state.view='quests';save();render();setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),0);});
}
function renderQuests(){
 const el=document.getElementById('view-quests');
 let f=getFiltered();
 let bySubject={};
 f.forEach(q=>{
   if(!bySubject[q.subject]) bySubject[q.subject]={title:q.subjectTitle,items:[]};
   bySubject[q.subject].items.push(q);
 });
 const subjectKeys=Object.keys(bySubject);
 const header=`<div class="headrow contentHead"><div><h2>Quest List</h2><p class="small">Grouped by subject. Mark weak topics for repeat review.</p><div class="questNudge">1 question + 1 note.</div><div class="compactTip"><b>Mobile:</b> open one subject, then one chapter.</div></div><div class="badges"><span class="badge good">Core</span><span class="badge bad">New</span><span class="badge purple">Weak</span></div></div>`;
 if(!subjectKeys.length){el.innerHTML=header+`<div class="callout">No quests match your search/filter.</div>`;return;}
 el.innerHTML=header+subjectKeys.map((subKey,sidx)=>{
   const sub=bySubject[subKey];
   const items=sub.items;
   const done=items.filter(q=>state.done[q.id]).length;
   const due=items.filter(q=>state.done[q.id]&&reviewStatus(q.id).due).length;
   const weak=items.filter(q=>state.weak[q.id]).length;
   const xp=items.reduce((a,q)=>a+q.xp,0);
   const openSub=(state.subject===subKey||due>0||weak>0)?' open':'';
   let chapters={};
   items.forEach(q=>{chapters[q.chapter]=chapters[q.chapter]||[];chapters[q.chapter].push(q);});
   const chapterHTML=Object.keys(chapters).map((ch,cidx)=>{
     const arr=chapters[ch];
     const cd=arr.filter(q=>state.done[q.id]).length;
     const hasDue=arr.some(q=>state.done[q.id]&&reviewStatus(q.id).due);
     const hasWeak=arr.some(q=>state.weak[q.id]);
     const openCh=(cidx===0||hasDue||hasWeak)?' open':'';
     return `<details class="chapter innerChapter"${openCh}><summary class="chapterHead"><div><h3>${ch}</h3><div class="small">${cd}/${arr.length} done</div></div><div class="badges"><span class="badge">${arr.reduce((a,q)=>a+q.xp,0)} XP</span>${hasDue?'<span class="badge warn">Due</span>':''}${hasWeak?'<span class="badge purple">Weak</span>':''}${arr.some(q=>q.nt)?'<span class="badge bad">New</span>':''}</div></summary><div class="questList">${arr.map(q=>questHTML(q)).join('')}</div></details>`;
   }).join('');
   return `<details class="chapter subjectGroup"${openSub}><summary class="chapterHead subjectHead"><div><h3>${sub.title}</h3><div class="small">${done}/${items.length} done • ${xp} XP</div></div><div class="badges">${due?`<span class="badge warn">${due} due</span>`:''}${weak?`<span class="badge purple">${weak} weak</span>`:''}</div></summary>${chapterHTML}</details>`;
 }).join('');
 bindQuestEvents();
}
function questHTML(q){const prob=calculationProblemHTML(q);const deliverable=prob?'Chapter: '+q.chapter+'. Review-only task: solve the embedded question first, then explain the method and write one mistake you must not repeat.':'Chapter: '+q.chapter+'. Review-only task: explain the concept, recall the key rule, and write one mistake you must not repeat.';const chips=`${q.nt?'<span class="badge bad">New</span>':''}${q.core?'<span class="badge good">Core</span>':''}${prob?'<span class="badge">1 Problem</span>':''}${state.weak[q.id]?'<span class="badge purple">Weak</span>':''}`;return `<div class="quest ${state.done[q.id]?'done':''}" data-id="${q.id}"><input type="checkbox" class="doneBox" ${state.done[q.id]?'checked':''}/><div><div class="questTop"><div class="questTitle">${q.item}</div><div class="mobileQuick">+${q.xp} XP</div></div><div class="questMeta">${chips}</div><details class="lessonDrawer"><summary>Details</summary><div class="lessonContent"><div class="questText">${deliverable}</div><div class="questMeta"><button class="secondary weakBtn" style="padding:4px 8px;font-size:11px">${state.weak[q.id]?'Not weak':'Weak'}</button></div>${prob}${reviewInfoHTML(q)}${videoRefresherHTML(q)}${practiceLinkHTML(q)}${topicNotesHTML(q)}</div></details></div><div class="xp">+${q.xp} XP</div></div>`;}
function bindQuestEvents(){
 document.querySelectorAll('.quest[data-id]').forEach(row=>{
   let id=row.dataset.id;
   const done=row.querySelector('.doneBox');
   const weak=row.querySelector('.weakBtn');
   if(done) done.onchange=e=>{state.completedAt=state.completedAt||{};state.lastReviewed=state.lastReviewed||{};state.reviewCount=state.reviewCount||{};state.done[id]=e.target.checked;if(e.target.checked){if(!state.completedAt[id])state.completedAt[id]=todayISO();recordActivity('quests');const s=stats();const qToday=state.daily?.[dayKey()]?.quests||0;if(qToday===(state.dailyTarget||3))showToast('🎯 Daily target complete. Stop here guilt-free or keep farming XP.');else if(s.done%10===0)showToast('🔥 '+s.done+' quests done. You are stacking proof.');else showToast('✅ Quest finished. Small win logged.');}else{delete state.done[id];delete state.completedAt[id];delete state.lastReviewed[id];delete state.reviewCount[id];}save();render();};
   const review=row.querySelector('.reviewBtn');
   if(review) review.onclick=()=>{state.lastReviewed=state.lastReviewed||{};state.reviewCount=state.reviewCount||{};state.lastReviewed[id]=todayISO();state.reviewCount[id]=(state.reviewCount[id]||0)+1;recordActivity('reviews');save();showToast('🧠 Reviewed. This is how memory gets stronger.');render();};
   if(weak) weak.onclick=()=>{state.weak[id]=!state.weak[id];if(!state.weak[id])delete state.weak[id];save();render();};
 });
 document.querySelectorAll('.practiceDone').forEach(cb=>{
   cb.onchange=e=>{state.practiceDone=state.practiceDone||{};state.practiceDone[e.target.dataset.rid]=e.target.checked;if(e.target.checked){recordActivity('practice');showToast('📝 Practice page finished. Good, this is real review.');}else delete state.practiceDone[e.target.dataset.rid];save();renderSidebar();};
 });
 document.querySelectorAll('.videoDone').forEach(cb=>{
   cb.onchange=e=>{state.videoDone=state.videoDone||{};state.videoDone[e.target.dataset.vid]=e.target.checked;if(e.target.checked){recordActivity('practice');showToast('🎥 Refresher watched. Now solve something.');}else delete state.videoDone[e.target.dataset.vid];save();renderSidebar();};
 });
 document.querySelectorAll('.topicNoteBox').forEach(tb=>{
   tb.oninput=e=>{state.topicNotes=state.topicNotes||{};state.topicNotes[e.target.dataset.id]=e.target.value;save();};
 });
}
function renderNew(){const el=document.getElementById('view-new');let n=quests.filter(q=>q.nt);let by={};n.forEach(q=>{by[q.subjectTitle]=by[q.subjectTitle]||[];by[q.subjectTitle].push(q)});el.innerHTML=`<div class="contentHead"><h2>New / Weak Areas</h2><p class="small">Prioritize these first.</p><div class="compactTip"><b>Mobile:</b> one section at a time.</div></div><div class="callout"><b>First:</b> finish these once before old notes.</div>`+Object.keys(by).map((sub,idx)=>`<details class="chapter" ${idx===0?'open':''}><summary class="chapterHead"><div><h3>${sub}</h3><div class="small">${by[sub].length} gap quests</div></div><span class="badge bad">New</span></summary><div class="questList">${by[sub].map(q=>questHTML(q)).join('')}</div></details>`).join('');bindQuestEvents();}
function renderMock(){const el=document.getElementById('view-mock');el.innerHTML=`<div class="contentHead"><h2>Mock Board Training Plan</h2><p class="small">This is the non-negotiable part. Reading feels productive, but boards are passed by retrieval, speed, and error correction.</p></div><div class="tableWrap"><table><thead><tr><th>Phase</th><th>Target</th><th>Quest rule</th><th>Pass condition</th></tr></thead><tbody>
<tr><td><b>Phase 1: Diagnostic</b></td><td>All subjects</td><td>20 mixed questions per subject, no notes.</td><td>Make a weakness list. No shame, just data.</td></tr>
<tr><td><b>Phase 2: New Audit</b></td><td>BMS/HVAC, Technopreneurship, Management, OOP/UML, CAD, Environment, Data security</td><td>Finish all New quests once.</td><td>Can explain each topic in 3-5 sentences and answer basic MCQs.</td></tr>
<tr><td><b>Phase 3: Core Recovery</b></td><td>Math, circuits, comms, signals, control</td><td>Timed 10-question sets. Review wrong answers immediately.</td><td>70%+ per set before moving on.</td></tr>
<tr><td><b>Phase 4: Weighted Mocks</b></td><td>20/30/20/30 distribution</td><td>Simulate subject weights instead of equal chapters.</td><td>Consistent 75%+ with time pressure.</td></tr>
<tr><td><b>Phase 5: Final Month</b></td><td>Weak items only</td><td>Repeat weak-marked quests and formula drills.</td><td>No repeated mistakes for 7 days.</td></tr>
</tbody></table></div><div class="callout"><b>Anti-failure rule:</b> every wrong answer must become a tiny flashcard: concept, formula, trap, correct method. Do not just write the final answer.</div>`;}

function renderPractice(){
 const el=document.getElementById('view-practice');let groups={};pinoyResources.forEach(r=>{groups[r.group]=groups[r.group]||[];groups[r.group].push(r);});
 el.innerHTML=`<div class="contentHead"><h2>Exact PinoyBIX Practice</h2><p class="small">Only direct topic practice pages are listed here. I removed general hubs and search links so one click takes you straight to practice.</p></div><div class="callout"><b>How to use:</b> open the exact topic, answer a small timed set, then tick the checkbox here. Use the topic notes inside each quest for formulas, traps, and wrong-answer patterns.</div>`+Object.keys(groups).map(g=>`<div class="chapter"><div class="chapterHead"><div><h3>${g}</h3><div class="small">${groups[g].length} exact practice resources</div></div></div><div class="questList">${groups[g].map(r=>{const rid=resourceId(r);return `<div class="quest practiceResourceRow ${state.practiceDone&&state.practiceDone[rid]?'done':''}"><input type="checkbox" class="practiceDone" data-rid="${rid}" ${state.practiceDone&&state.practiceDone[rid]?'checked':''}/><div><div class="questTitle">${r.title}</div><div class="questText">Direct topic page. Matching keywords: ${(r.match||[]).slice(0,6).join(', ')}</div><div class="practiceLinks"><a class="practiceLink" href="${r.url}" target="_blank" rel="noopener">Open and practice now</a></div></div><div class="xp">${state.practiceDone&&state.practiceDone[rid]?'✓':'↗'}</div></div>`}).join('')}</div></div>`).join('');
 bindQuestEvents();
}

function renderReview(){
 const el=document.getElementById('view-review');
 const done=quests.filter(q=>state.done&&state.done[q.id]);
 const due=done.filter(q=>reviewStatus(q.id).due);
 const soon=done.filter(q=>reviewStatus(q.id).soon);
 const fresh=done.filter(q=>!reviewStatus(q.id).due && !reviewStatus(q.id).soon);
 function block(title,arr,badge){return `<div class="chapter"><div class="chapterHead"><div><h3>${title}</h3><div class="small">${arr.length} lessons</div></div><span class="badge ${badge||''}">spaced review</span></div><div class="questList">${arr.length?arr.map(q=>questHTML(q)).join(''):'<div class="callout">Nothing here right now.</div>'}</div></div>`}
 el.innerHTML=`<div class="contentHead"><h2>Review Tracker</h2><p class="small">When you tick a lesson as finished, the app records the finish date. Use Reviewed after you revisit it. The next review spacing is 1, 3, 7, 14, 30, then 60 days.</p></div><div class="callout"><b>Better retention rule:</b> do not wait until you forget everything. Review due items first, especially weak topics and calculation drills.</div>`+block('Due now',due,'bad')+block('Coming soon',soon,'warn')+block('Not due yet',fresh,'good');
 bindQuestEvents();
}

function weakTopicsHTML(){
 const weakQs=quests.filter(q=>state.weak[q.id]);
 if(!weakQs.length) return `<div class="callout"><b>Weak topics:</b> none marked yet. Use the Weak button inside any quest.</div>`;
 let by={};
 weakQs.forEach(q=>{by[q.subjectTitle]=by[q.subjectTitle]||[];by[q.subjectTitle].push(q);});
 return `<div class="callout"><b>Weak topics</b><div class="small">Use this as your comeback list. Open one, review, then unmark when it feels stable.</div></div>`+
 Object.keys(by).map(sub=>`<details class="chapter" open><summary class="chapterHead"><div><h3>${sub}</h3><div class="small">${by[sub].length} weak topic${by[sub].length===1?'':'s'}</div></div><span class="badge purple">Weak</span></summary><div class="weakList">`+
 by[sub].map(q=>`<div class="weakItem"><div><b>${q.item}</b><div class="small">${q.chapter}${state.topicNotes?.[q.id]?` • Note: ${escapeHTML(state.topicNotes[q.id]).slice(0,120)}${state.topicNotes[q.id].length>120?'...':''}`:''}</div></div><button class="secondary openWeakBtn" data-id="${q.id}" style="padding:6px 9px;font-size:12px">Open</button></div>`).join('')+
 `</div></details>`).join('');
}
function renderNotes(){
 const el=document.getElementById('view-notes');
 const backupBox=`<div class="card backupCard"><h3>💾 Backup & Transfer</h3><p class="small">Use this before changing browser, phone, or file location. Includes video checkboxes.</p><div class="two"><button class="secondary" id="exportBtn">⬇️ Export</button><label class="secondary" style="text-align:center;cursor:pointer">⬆️ Import<input type="file" id="importFile" class="hidden" accept="application/json" /></label></div><div id="backupStatus" class="small" style="min-height:18px;margin-top:6px"></div><button class="danger" id="resetBtn" style="margin-top:8px">🧹 Reset Progress</button></div>`;
 el.innerHTML=`<div class="contentHead"><h2>📓 Logbook</h2><p class="small">Weak topics, mistake log, and backup tools.</p></div>${backupBox}${weakTopicsHTML()}<textarea id="notesBox" class="notes" placeholder="Mistake log, formulas, weak topics, review reminders...">${state.notes||''}</textarea><div style="margin-top:10px"><button class="primary" id="saveNotes">Save Logbook</button></div>`;
 document.getElementById('saveNotes').onclick=()=>{state.notes=document.getElementById('notesBox').value;save();alert('Logbook saved.');};
 document.querySelectorAll('.openWeakBtn').forEach(btn=>btn.onclick=()=>{const q=quests.find(x=>x.id===btn.dataset.id);if(!q)return;state.subject=q.subject;state.filter='weak';state.view='quests';save();render();});
 attachBackupHandlers();
}
function render(){renderSidebar();document.querySelectorAll('section[id^="view-"]').forEach(x=>x.classList.add('hidden'));document.getElementById('view-'+state.view).classList.remove('hidden');
document.addEventListener('toggle',e=>{if(e.target.matches('.lessonDrawer')&&e.target.open){document.querySelectorAll('.lessonDrawer[open]').forEach(d=>{if(d!==e.target)d.open=false;});}},true);
document.addEventListener('toggle',e=>{if(e.target.matches('details.chapter')&&e.target.open&&window.matchMedia('(max-width:900px)').matches){const parent=e.target.parentElement;const cls=e.target.classList.contains('subjectGroup')?'subjectGroup':(e.target.classList.contains('innerChapter')?'innerChapter':'chapter');parent.querySelectorAll(':scope > details.'+cls+'[open]').forEach(d=>{if(d!==e.target)d.open=false;});}},true);

document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));document.querySelectorAll('#mobileStickyNav button').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));if(state.view==='map')renderMap();if(state.view==='quests')renderQuests();if(state.view==='new')renderNew();if(state.view==='mock')renderMock();if(state.view==='practice')renderPractice();if(state.view==='review')renderReview();if(state.view==='notes')renderNotes();}
load();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.view=t.dataset.view;save();render();});
document.querySelectorAll('#mobileStickyNav button').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;save();render();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('search').oninput=()=>{state.view='quests';render();};
document.getElementById('filter').onchange=()=>{const f=document.getElementById('filter').value;state.view=f==='new'?'new':(f==='due'?'review':'quests');render();};
function backupPayload(){return {app:'ECE Board Review 2026 Quest Map',version:'2026-video-refresher-v5',exportedAt:new Date().toISOString(),state:{...state}};}
function setBackupStatus(msg){const el=document.getElementById('backupStatus');if(el)el.textContent=msg;}
function attachBackupHandlers(){
 const exportBtn=document.getElementById('exportBtn');
 const importFile=document.getElementById('importFile');
 const resetBtn=document.getElementById('resetBtn');
 if(exportBtn)exportBtn.onclick=()=>{const payload=backupPayload();let blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ece_board_review_progress_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);setBackupStatus('Exported. Keep the JSON file safe.');};
 if(importFile)importFile.onchange=e=>{let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{const incoming=JSON.parse(r.result);const importedState=incoming.state?incoming.state:incoming;state={...state,...importedState,done:{...(state.done||{}),...(importedState.done||{})},completedAt:{...(state.completedAt||{}),...(importedState.completedAt||{})},lastReviewed:{...(state.lastReviewed||{}),...(importedState.lastReviewed||{})},reviewCount:{...(state.reviewCount||{}),...(importedState.reviewCount||{})},weak:{...(state.weak||{}),...(importedState.weak||{})},practiceDone:{...(state.practiceDone||{}),...(importedState.practiceDone||{})},videoDone:{...(state.videoDone||{}),...(importedState.videoDone||{})},topicNotes:{...(state.topicNotes||{}),...(importedState.topicNotes||{})},notes:importedState.notes!==undefined?importedState.notes:(state.notes||'')};save();render();state.view='notes';save();render();setBackupStatus('Imported.');alert('Progress imported.');}catch(err){setBackupStatus('Import failed.');alert('Import failed. This is not a valid backup file.');}finally{e.target.value='';}};r.readAsText(file);};
 if(resetBtn)resetBtn.onclick=()=>{if(confirm('Reset all progress and weak marks?')){state={done:{},completedAt:{},lastReviewed:{},reviewCount:{},weak:{},practiceDone:{},videoDone:{},topicNotes:{},activityDates:{},daily:{},dailyTarget:3,subject:'all',view:'map',notes:''};save();render();}};
}
render();
</script>
