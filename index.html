/* Minimal mode overrides */
:root{
  --bg:#0f172a; --card:#111827; --soft:#1f2937; --text:#f8fafc; --muted:#cbd5e1;
  --accent:#38bdf8; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --border:#334155;
  --purple:#a78bfa; --gold:#facc15; --pink:#f9a8d4; --panel:#111827; --darkPanel:#0b1120;
}
body{background:var(--bg)!important;color:var(--text);font-size:14px}
.app{max-width:1120px;padding:18px 14px 46px}
.hero{margin-bottom:12px;gap:8px}.eyebrow{display:none}
h1{font-size:clamp(24px,4vw,38px)!important;color:var(--text)!important;letter-spacing:-.03em}
.subtitle{font-size:14px;line-height:1.45;max-width:780px}
.layout{grid-template-columns:260px 1fr;gap:14px}
.panel,.card,.quest,.chapter,.quizCard,.callout,.notice,.copyBox,.uploadBox,.resourceCheck{
  background:var(--card)!important;border:1px solid var(--border)!important;box-shadow:none!important;border-radius:14px!important}
.panel{padding:14px}.sidebar{top:10px}
.chapterBtn,.tab,.quizOption,button.primary,button.secondary,button.danger,.input,.textarea{border-radius:10px!important;box-shadow:none!important}
.chapterBtn{padding:10px;background:var(--darkPanel)!important}.chapterBtn.active{background:#172033!important;border-color:var(--accent)!important}.chapterBtn.done{border-color:var(--good)!important}
.tabs{gap:6px;margin-bottom:10px}.tab{padding:8px 10px;font-size:13px;background:var(--darkPanel)!important}.tab.active,button.primary{background:var(--accent)!important;color:#082f49!important}
.courseHead h2,.contentHead h2{font-size:clamp(20px,3vw,28px)!important;color:var(--text)!important}
.card h3,.lessonText h3,.chapterHead h3{color:var(--text)!important}
.small,.footerNote,.card p,.card li{font-size:13px;line-height:1.42}
.badge,.tag,.pill{font-size:11px;padding:4px 7px;border-radius:999px}
.badge.good{background:rgba(34,197,94,.12);color:#86efac}.badge.warn{background:rgba(245,158,11,.12);color:#fcd34d}.badge.bad{background:rgba(239,68,68,.12);color:#fca5a5}.badge.purple,.tag.purple{background:rgba(167,139,250,.12);color:#ddd6fe}
.callout,.notice,.compactTip,.questNudge{padding:10px 12px!important;margin:8px 0!important;line-height:1.4!important}.questNudge{font-weight:700;color:#fef08a}.compactTip{background:#0b1120!important;border:1px solid var(--border)!important;border-radius:10px!important}
.gameHud{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.hudCard{padding:10px;border-radius:12px;box-shadow:none}.hudCard strong{font-size:20px}.progressWrap,.xpWrap{height:8px}
.questList,.taskList,.resourceList{gap:8px}.quest{padding:12px!important;margin-bottom:8px!important}.questTop,.headrow,.contentHead,.chapterHead{gap:8px}.questTitle{font-size:15px!important;line-height:1.3}.questDetails{margin-top:8px}
.formula,.answerBox,.questionBox,.practiceBox,.notesBox{border-radius:10px!important;padding:10px!important}.textarea{min-height:74px;font-size:13px}
button.primary,button.secondary,button.danger{padding:9px 11px;font-size:13px}.actions,.miniNav{gap:8px;margin-top:10px}
table{min-width:560px}th,td{padding:8px;font-size:12px}details.chapter{margin-bottom:10px}summary.chapterHead{padding:12px!important}details.lessonDetails summary{font-size:13px}
.mobileBottomNav{box-shadow:0 -8px 18px rgba(0,0,0,.25)!important;background:#0b1120!important;border-top:1px solid var(--border)!important}.mobileBottomNav button{font-size:12px}
@media(max-width:880px){
  .app{padding:12px 10px 76px}h1{font-size:24px!important}.subtitle{font-size:13px}.panel{padding:12px}.layout{display:block}
  .tabs{position:sticky;top:0;z-index:5;background:var(--bg);padding:8px 0}.tab{padding:8px 9px;font-size:12px}.contentHead{margin-top:4px}
  .gameHud{grid-template-columns:repeat(3,minmax(0,1fr))}.hudCard strong{font-size:18px}.hudCard span{font-size:10px}.chapterHead h3{font-size:15px}.questTitle{font-size:14px!important}.small{font-size:12px}.badges{gap:4px}.badge,.tag,.pill{font-size:10px;padding:3px 6px}
}

function normText(x){return String(x||'').toLowerCase().replace(/[^a-z0-9]+/g,' ');} 
function resourceId(r){return btoa(unescape(encodeURIComponent(r.url))).replace(/=+$/,'');}
function practiceMatches(q){
 const hay=normText(q.subjectTitle+' '+q.chapter+' '+q.item);
 let links=[];
 pinoyResources.forEach(r=>{
   const groupOk = (r.group==='Mathematics' && q.subject==='math') ||
                   (r.group==='Electronics Engineering' && q.subject==='ee') ||
                   (r.group==='GEAS' && q.subject==='geas') ||
                   (r.group==='EST / Communications' && q.subject==='est') ||
                   (!['Mathematics','Electronics Engineering','GEAS','EST / Communications'].includes(r.group));
   const hit=groupOk && (r.match||[]).some(m=>hay.includes(normText(m)));
   if(hit && !links.some(x=>x.url===r.url))links.push(r);
 });
 return links.slice(0,3);
}
function practiceTarget(q){
  if(state.weak&&state.weak[q.id]) return {count:15,extra:'If you score below 70%, do 10 more.'};
  if(q.nt) return {count:15,extra:'New scope: do another 10 if it feels unfamiliar.'};
  if(q.core||q.weight===30) return {count:12,extra:'Core topic: aim for 70%+ before moving on.'};
  return {count:8,extra:'Light topic: enough to recognize the pattern.'};
}
function practiceLinkHTML(q){
 const arr=practiceMatches(q);
 const target=practiceTarget(q);
 if(!arr.length){return `<div class="noPractice">No exact practice scroll confirmed for this spell yet. Use your review-center notes or question bank for this one.</div>`;}
 const qDone=state.practiceQuestDone&&state.practiceQuestDone[q.id];
 return `<div class="practicePanel" data-qid="${q.id}"><div class="practiceTitle">📜 Practice scrolls</div><div class="practiceTarget"><b>Target:</b> Do ${target.count} MCQs from any one scroll. ${target.extra}</div>${arr.map(r=>{const rid=resourceId(r);return `<label class="practiceItem"><input type="checkbox" class="practiceDone" data-qid="${q.id}" data-rid="${rid}" ${state.practiceDone&&state.practiceDone[rid]?'checked':''}/><span><a class="practiceLink" href="${r.url}" target="_blank" rel="noopener">${r.title}</a><small>Mark after you finish the target set.</small></span></label>`;}).join('')}<div class="practiceTarget ${qDone?'done':''}">${qDone?'✅ Practice target sealed for this quest.':'Checking any one scroll completes the practice task.'}</div></div>`;
}

 const hay=(q.subjectTitle+' '+q.chapter+' '+q.item).toLowerCase();

 if(q.subject==='math'){
   if(hay.includes('limits')||hay.includes('continuity')||hay.includes('functions')) p=mk('Board-style drill', 'Evaluate the limit: lim(x→2) [(x² - 4)/(x - 2)]. State whether the function can be made continuous at x = 2.', 'Limit = 4. Yes, define f(2)=4 to remove the discontinuity.', 'Factor x²−4 as (x−2)(x+2).');
   else if(hay.includes('derivatives')||hay.includes('differentiation')) p=mk('Board-style drill', 'For y = x³ − 6x² + 9x + 2, find the critical points and identify whether each is a local maximum or minimum.', 'y′=3x²−12x+9=3(x−1)(x−3). y″=6x−12. At x=1: y″<0, local max. At x=3: y″>0, local min.', 'Derivative for critical points, second derivative for classification.');
   else if(hay.includes('parametric')) p=mk('Board-style drill', 'Given x=t²+1 and y=t³−3t, find dy/dx at t=2.', 'dy/dx=(dy/dt)/(dx/dt)=(3t²−3)/(2t). At t=2, dy/dx=9/4=2.25.', 'Differentiate x and y separately with respect to t.');
   else if(hay.includes('partial')) p=mk('Board-style drill', 'For z=x²y+3xy², find ∂z/∂x and evaluate it at x=2, y=1.', '∂z/∂x=2xy+3y². At (2,1), value = 4+3=7.', 'Treat y as constant when differentiating with respect to x.');
   else if(hay.includes('integration')||hay.includes('integral')) p=mk('Board-style drill', 'Evaluate ∫₀² (3x² − 4x + 1) dx.', 'Antiderivative: x³ − 2x² + x. From 0 to 2: 8−8+2=2.', 'Integrate term by term, then apply upper minus lower.');
   else if(hay.includes('improper')) p=mk('Board-style drill', 'Determine whether ∫₁∞ 1/x² dx converges. If it converges, find its value.', 'It converges. ∫₁∞ x⁻² dx = [-1/x]₁∞ = 1.', 'Replace infinity with a limit.');
   else if(hay.includes('multiple')) p=mk('Board-style drill', 'Evaluate ∬R (x+y) dA over 0≤x≤2 and 0≤y≤1.', '∫₀²∫₀¹(x+y)dy dx = ∫₀²(x+1/2)dx = 3.', 'Inner integral first, then outer integral.');
   else if(hay.includes('ode')||hay.includes('differential equations')) p=mk('Board-style drill', 'Solve dy/dx = 3x² with y(0)=2.', 'y=x³+C. Using y(0)=2 gives C=2, so y=x³+2.', 'Integrate both sides with respect to x.');
   else if(hay.includes('laplace')) p=mk('Board-style drill', 'Find the Laplace transform of f(t)=3e^(−2t)+4sin(5t).', 'L{f}=3/(s+2)+20/(s²+25).', 'Use linearity, L{e^(at)}=1/(s−a), and L{sin bt}=b/(s²+b²).');
   else if(hay.includes('complex')) p=mk('Board-style drill', 'Convert 3 − j4 to polar form.', 'Magnitude = 5. Angle = atan(−4/3)=−53.13°. Polar form = 5∠−53.13°.', 'Magnitude is sqrt(a²+b²).');
   else if(hay.includes('fourier')) p=mk('Board-style drill', 'A periodic signal has fundamental frequency 60 Hz. What are the frequencies of the 3rd, 5th, and 7th harmonics?', '180 Hz, 300 Hz, and 420 Hz.', 'nth harmonic = n times the fundamental.');
   else if(hay.includes('numerical')) p=mk('Board-style drill', 'Using the trapezoidal rule with h=1, estimate ∫₀² x² dx using x=0,1,2.', 'Approximation = h/2[f(0)+2f(1)+f(2)] = 1/2[0+2(1)+4]=3.', 'This is intentionally not exact; exact value is 8/3.');
   else if(hay.includes('probability')||hay.includes('sampling')||hay.includes('distributions')) p=mk('Board-style drill', 'A component has failure probability 0.02. In 10 independent components, approximate the probability that exactly one fails.', 'C(10,1)(0.02)(0.98)^9 ≈ 0.1667.', 'Use the binomial formula.');
   else if(hay.includes('statistical intervals')||hay.includes('estimation')) p=mk('Board-style drill', 'A sample of n=36 has mean 80 and known σ=12. Find the 95% confidence interval for the population mean.', 'Margin = 1.96(12/√36)=3.92. CI = 76.08 to 83.92.', 'Known sigma means use z, not t.');
   else if(hay.includes('hypothesis')) p=mk('Board-style drill', 'Test H₀: μ=50 vs H₁: μ>50. Given x̄=53, σ=6, n=36. Compute z and decide at α=0.05.', 'z=(53−50)/(6/√36)=3. Since 3>1.645, reject H₀.', 'Right-tailed z test.');
   else if(hay.includes('regression')||hay.includes('correlation')) p=mk('Board-style drill', 'For x=[1,2,3] and y=[2,4,5], estimate the least-squares line y=a+bx.', 'b=1.5, a≈0.667. Line: y≈0.667+1.5x.', 'Compute b=Sxy/Sxx, then a=ȳ−bx̄.');
   else if(hay.includes('vector')||hay.includes('gradient')||hay.includes('divergence')||hay.includes('curl')||hay.includes('directional')) p=mk('Board-style drill', 'For scalar field φ=x²y+yz, find ∇φ at point (1,2,3).', '∇φ=(2xy, x²+z, y). At (1,2,3): (4,4,2).', 'Gradient is partial derivatives in x, y, z.');
   else if(hay.includes('green')||hay.includes('stokes')||hay.includes('divergence theorem')) p=mk('Board-style drill', 'For vector field F=(x,y,z), compute ∇·F.', '∇·F = ∂x/∂x + ∂y/∂y + ∂z/∂z = 3.', 'Divergence measures source strength per volume.');

 }
 else if(q.subject==='ee'){
   if(hay.includes('resistive')||hay.includes('dc')||hay.includes('ohm')) p=mk('Circuit drill', 'A 12 V source is connected to R1=2 kΩ in series with R2=4 kΩ. Find total current and voltage across R2.', 'RT=6 kΩ. I=12/6000=2 mA. VR2=I·R2=8 V.', 'Series current is the same through all resistors.');

   else if(hay.includes('transient')) p=mk('Circuit drill', 'An RC circuit has R=10 kΩ and C=100 µF. Find the time constant and approximate time to reach 99% final value.', 'τ=RC=1 s. 99% settling ≈5τ=5 s.', 'For first-order RC/RL, use τ.');
   else if(hay.includes('ac')||hay.includes('impedance')||hay.includes('admittance')) p=mk('AC circuit drill', 'A 100 Ω resistor is in series with an inductor having XL=75 Ω. Find the magnitude of total impedance.', '|Z|=√(100²+75²)=125 Ω.', 'Series R-L impedance is R+jXL.');

   else if(hay.includes('power in ac')) p=mk('AC circuit drill', 'A load draws 5 A at 220 V with power factor 0.8 lagging. Find real power.', 'P=VIpf=220×5×0.8=880 W.', 'Single-phase real power.');

   else if(hay.includes('sensor')||hay.includes('transducer')||hay.includes('daq')) p=mk('Instrumentation drill', 'A temperature sensor outputs 10 mV/°C. What output voltage is expected at 75°C?', 'V=75×10 mV=750 mV=0.75 V.', 'Watch mV to V conversion.');
   else if(hay.includes('plc')||hay.includes('hvac')||hay.includes('bms')) p=mk('Controls integration drill', 'An HVAC sensor has range 0–50°C mapped to 0–10 V. What voltage corresponds to 30°C?', 'V=(30/50)×10=6 V.', 'Linear scaling.');

   else if(hay.includes('microprocessor')||hay.includes('memory')||hay.includes('i/o')||hay.includes('instruction')||hay.includes('assembly')||hay.includes('microcontroller')) p=mk('Microprocessor drill', 'A memory subsystem uses a 16-bit address bus. How many unique byte-addressable memory locations can it address?', '2¹⁶=65,536 locations = 64 KB if each address stores 1 byte.', 'Address lines determine number of addresses.');

   else if(hay.includes('cad')||hay.includes('dimensioning')||hay.includes('plotting')) p=mk('CAD scale drill', 'A 25 m line is plotted at 1:500 scale. What is its length on paper in mm?', '25 m = 25,000 mm. Paper length=25,000/500=50 mm.', 'Convert to mm before applying scale.');
   else if(hay.includes('materials science')||hay.includes('atomic')||hay.includes('crystalline')||hay.includes('mechanical properties')) p=mk('Materials drill', 'A metal rod experiences stress of 150 MPa and has Young’s modulus 200 GPa. Find strain.', 'strain=stress/E=150×10⁶ / 200×10⁹ = 0.00075.', 'Use both in pascals.');
 }
 else if(q.subject==='est'){
   if(hay.includes('sampling')||hay.includes('aliasing')) p=mk('Signals drill', 'A signal has maximum frequency 4 kHz. What minimum sampling rate avoids aliasing?', 'fs ≥ 2fmax = 8 kHz.', 'Nyquist rate.');
   else if(hay.includes('fir')||hay.includes('iir')||hay.includes('difference')) p=mk('DSP drill', 'For y[n]=0.5x[n]+0.5x[n−1], find y[2] if x[1]=4 and x[2]=6.', 'y[2]=0.5(6)+0.5(4)=5.', 'FIR output uses present and past inputs.');

   else if(hay.includes('z-transform')||hay.includes('pole-zero')||hay.includes('filtering')) p=mk('DSP drill', 'A digital filter has pole at z=0.8. Is it stable?', 'Yes, for a causal discrete-time system all poles must be inside the unit circle; |0.8|<1.', 'Unit circle test.');
   else if(hay.includes('fourier')||hay.includes('spectra')) p=mk('Signals drill', 'A 2 kHz tone is sampled at 8 kHz. What normalized digital frequency in cycles/sample?', 'f/fs = 2000/8000 = 0.25 cycles/sample.', 'Normalized frequency depends on sampling rate.');

   else if(hay.includes('digital modulation')||hay.includes('ask')||hay.includes('fsk')||hay.includes('psk')||hay.includes('qam')) p=mk('Digital comms drill', 'A 16-QAM system transmits symbols at 2400 baud. Find bit rate.', '16-QAM carries log2(16)=4 bits/symbol. Bit rate=2400×4=9600 bps.', 'Bits per symbol = log2(M).');
   else if(hay.includes('pcm')||hay.includes('pam')||hay.includes('pwm')||hay.includes('ppm')) p=mk('Pulse modulation drill', 'A PCM system samples voice at 8 kHz using 8 bits/sample. Find bit rate.', 'Rb=8000×8=64 kbps.', 'This is the classic telephone PCM rate.');

function solutionStepsFor(q,p){
 const hay=(q.subjectTitle+' '+q.chapter+' '+q.item+' '+p.problem).toLowerCase();
 const rule=p.hint||'Identify what is asked, choose the matching formula or rule, substitute the given values, then simplify carefully.';
 let method='';
 let trap='';
 if(hay.includes('limit')){method='Factor or simplify first, cancel the term causing 0/0 if allowed, then substitute the approaching value.';trap='Do not substitute too early when it gives 0/0; that means you still need algebra.';}
 else if(hay.includes('derivative')||hay.includes('critical')){method='Differentiate the function, set the derivative equal to zero for critical points, then use the second derivative or sign test to classify them.';trap='A zero derivative only finds candidates; classification needs another check.';}
 else if(hay.includes('integral')||hay.includes('∫')){method='Find the antiderivative term by term, then apply upper limit minus lower limit for definite integrals.';trap='For definite integrals, do not forget the lower-limit subtraction.';}
 else if(hay.includes('laplace')){method='Use linearity: transform each term separately, then add the transformed terms.';trap='Watch the sign in e^(at): the denominator becomes s−a.';}
 else if(hay.includes('polar')||hay.includes('complex')){method='Compute magnitude with the square-root of real² plus imaginary², then compute the angle using arctangent with the correct quadrant.';trap='Rectangular operations and polar operations are not interchangeable.';}
 else if(hay.includes('node')||hay.includes('nodal')){method='Write KCL at the node: sum currents leaving or entering equals zero, using current = voltage difference divided by resistance.';trap='Keep current directions consistent; mixed signs create wrong node voltages.';}
 else if(hay.includes('series')||hay.includes('voltage across')||hay.includes('ohm')){method='Combine series resistances, compute total current using Ohms law, then use that same current for each series resistor voltage drop.';trap='In series: current is common. In parallel: voltage is common.';}
 else if(hay.includes('thevenin')){method='Deactivate independent sources, find the resistance seen from the load terminals, then use the equivalent resistance/source as needed.';trap='Voltage sources short when deactivated; current sources open.';}
 else if(hay.includes('time constant')||hay.includes('rc')){method='Convert units first, multiply R and C for τ, then use the settling-time rule if asked.';trap='Microfarads must become farads before multiplying.';}
 else if(hay.includes('impedance')){method='Write impedance in rectangular form, then take magnitude using the Pythagorean relationship.';trap='Reactance contributes to phase; do not simply add magnitudes unless purely resistive.';}
 else if(hay.includes('snr')){method='Find the power ratio first, then convert to decibels using 10 log10(power ratio).';trap='Use 10 log for power ratios, 20 log for voltage/current ratios only when impedance is the same.';}
 else if(hay.includes('modulation index')||hay.includes('carson')){method='Compute modulation index from frequency deviation divided by modulating frequency, then use Carson’s bandwidth rule.';trap='Keep kHz units consistent before adding frequencies.';}
 else if(hay.includes('bit rate')||hay.includes('baud')||hay.includes('pcm')){method='Find bits per symbol or bits per sample, then multiply by symbol rate or sampling rate.';trap='Baud is symbols per second; bit rate depends on bits per symbol.';}
 else if(hay.includes('shannon')){method='Use Shannon capacity with bandwidth times log2(1+linear SNR).';trap='If SNR is given in dB, convert to linear before using the formula.';}
 else if(hay.includes('reflection coefficient')){method='Use load impedance minus characteristic impedance over their sum, then take magnitude if asked.';trap='Sign can matter for phase, but magnitude ignores the sign.';}
 else if(hay.includes('power density')){method='For isotropic radiation, spread power over the surface area of a sphere: 4πr².';trap='Distance is squared, so doubling distance quarters power density.';}
 else if(hay.includes('confidence interval')||hay.includes('hypothesis')||hay.includes('probability')){method='Identify the statistical model, plug values into the formula, then make the decision or interval from the computed statistic.';trap='Check whether the problem asks for probability, interval, or decision; they use different final formats.';}
 else {method='Read the asked quantity, list the given values, apply the main formula/rule, show substitution, simplify, then state the final answer with units.';trap='Most board mistakes are unit errors, sign errors, or using the right formula for the wrong quantity.';}
 return {rule,method,trap};
}
function calculationProblemHTML(q){
 const p=problemFor(q); if(!p)return '';
 const sol=solutionStepsFor(q,p);
 const checked=state.solutionDone&&state.solutionDone[q.id]?'checked':'';
 return `<div class="problemBox"><b>Question:</b> ${escHTML(p.problem)}${p.hint?`<div class="small"><span class="formulaTiny">Hint:</span> ${escHTML(p.hint)}</div>`:''}<details class="solutionBox"><summary>Show complete solution</summary><div class="solutionContent"><ol class="solutionSteps"><li><b>Rule to use:</b> ${escHTML(sol.rule)}</li><li><b>Method:</b> ${escHTML(sol.method)}</li><li><b>Work it through:</b> ${escHTML(p.answer)}</li></ol><div class="solutionFinal"><b>Final answer:</b> ${escHTML(p.answer)}</div><div class="solutionTrap"><b>Board trap:</b> ${escHTML(sol.trap)}</div><label class="solutionCheck"><input type="checkbox" class="solutionDone" data-qid="${q.id}" ${checked}/><span>I understand this solution<small>This counts as one quest task.</small></span></label></div></details></div>`;
}

  document.body.classList.add('spell-impact','reducto-impact');

function topicExplainer(q){
  const hay=(q.subjectTitle+' '+q.chapter+' '+q.item).toLowerCase();
  const base=(what,why,hook)=>({what,why,hook});
  let e=null;
  if(hay.includes('limits')||hay.includes('continuity')) e=base('Limits describe what a function approaches near a value, even when the value itself is missing or undefined. Continuity means the graph has no break at that point.','Boards use this to test algebra, factoring, and whether you understand removable discontinuities.','Memory hook: approach first, substitute last.');
  else if(hay.includes('derivative')||hay.includes('differentiation')) e=base('Derivatives measure instantaneous rate of change: slope, speed, sensitivity, or maximum/minimum behavior.','This is the engine behind optimization, related rates, curves, circuits, and signals.','Memory hook: derivative = how fast the output reacts.');
  else if(hay.includes('integral')||hay.includes('integration')) e=base('Integrals accumulate tiny pieces: area, total charge, energy, volume, probability, or work.','Board questions often hide “total amount” problems behind simple formulas.','Memory hook: derivative splits; integral adds back.');
  else if(hay.includes('laplace')) e=base('Laplace transforms convert time-domain differential equations into algebraic s-domain equations.','Useful for circuits, control systems, transient response, and transfer functions.','Memory hook: time problem becomes algebra problem.');
  else if(hay.includes('complex')) e=base('Complex numbers represent magnitude and phase using rectangular form a+jb or polar form r∠θ.','AC circuits, phasors, communications, and signal analysis depend on this.','Memory hook: rectangular for adding, polar for multiplying.');
  else if(hay.includes('probability')||hay.includes('statistics')||hay.includes('regression')||hay.includes('sampling')) e=base('Statistics turns uncertain data into estimates, decisions, and confidence levels.','ECE boards use it for reliability, measurements, sampling, and decision questions.','Memory hook: sample data is evidence, not certainty.');
  else if(hay.includes('dc')||hay.includes('resistive')||hay.includes('ohm')) e=base('DC circuits are steady-state circuits where voltage, current, and resistance are related by Ohm’s law and Kirchhoff laws.','This is the foundation for almost every circuit analysis topic.','Memory hook: current needs a closed path; voltage is the push.');
  else if(hay.includes('mesh')||hay.includes('node')) e=base('Nodal and mesh analysis are systematic ways to write circuit equations using KCL or KVL.','They prevent guessing when circuits get too complex for simple series-parallel reduction.','Memory hook: node = currents; mesh = voltages.');
  else if(hay.includes('thevenin')||hay.includes('norton')||hay.includes('theorems')) e=base('Network theorems simplify a complicated circuit into an equivalent source and resistance.','This makes load calculations and maximum power transfer much faster.','Memory hook: replace the messy circuit with one simple source.');
  else if(hay.includes('ac')||hay.includes('impedance')||hay.includes('phasor')) e=base('AC analysis uses impedance and phasors to handle sinusoidal voltage/current with magnitude and phase.','It connects circuits to power systems, filters, resonance, and communications.','Memory hook: resistance is real; reactance turns phase.');
  else if(hay.includes('diode')||hay.includes('bjt')||hay.includes('fet')||hay.includes('mosfet')||hay.includes('amplifier')) e=base('Electronic devices control current using junctions, biasing, and small-signal behavior.','Boards test whether you can identify operating regions and basic amplifier behavior.','Memory hook: bias sets the starting point; signal rides on top.');
  else if(hay.includes('op-amp')) e=base('An op-amp is a high-gain differential amplifier usually analyzed with feedback assumptions.','It appears in amplifiers, filters, comparators, and instrumentation circuits.','Memory hook: ideal op-amp with negative feedback tries to make V+ equal V−.');
  else if(hay.includes('control')||hay.includes('stability')||hay.includes('root locus')||hay.includes('transfer function')) e=base('Control systems study how outputs respond to inputs through feedback, poles, zeros, and stability.','ECE boards love time response, steady-state error, root locus, and block diagram reduction.','Memory hook: poles decide behavior; feedback shapes it.');
  else if(hay.includes('signal')||hay.includes('fourier')||hay.includes('spectrum')||hay.includes('z-transform')) e=base('Signals topics describe information as waveforms, spectra, samples, or transformed representations.','Communications, filters, DSP, and systems depend on recognizing time vs frequency behavior.','Memory hook: time shows when; frequency shows what is inside.');
  else if(hay.includes('modulation')||hay.includes('amplitude modulation')||hay.includes('frequency modulation')) e=base('Modulation places information onto a carrier by changing amplitude, frequency, or phase.','This is central to radio, wireless, broadcasting, and communication systems.','Memory hook: message rides on a carrier.');
  else if(hay.includes('antenna')||hay.includes('wave propagation')) e=base('Antennas convert electrical signals into electromagnetic waves and back. Propagation describes how waves travel.','Boards test gain, radiation pattern, wavelength, polarization, and losses.','Memory hook: antenna size follows wavelength.');
  else if(hay.includes('digital communications')||hay.includes('data communications')||hay.includes('network')||hay.includes('osi')) e=base('Data communications moves bits between systems using coding, protocols, layers, and error control.','Modern ECE boards increasingly include networks, security, and digital systems.','Memory hook: protocols are rules so devices understand each other.');
  else if(hay.includes('microprocessor')||hay.includes('microcontroller')||hay.includes('assembly')) e=base('Microprocessors and microcontrollers execute instructions and interact with memory and I/O.','Expect architecture, instruction flow, addressing, interrupts, and embedded-system basics.','Memory hook: CPU thinks; memory stores; I/O talks to the outside world.');
  else if(hay.includes('engineering economics')||hay.includes('money-time')) e=base('Engineering economics compares choices using interest, time value of money, cash flows, and depreciation.','It turns “which option is better?” into a numbers decision.','Memory hook: money today is not equal to money later.');
  else if(hay.includes('management')||hay.includes('technopreneurship')||hay.includes('business')) e=base('Management and technopreneurship cover planning, organizing, leading, markets, business models, and execution.','These newer GEAS topics are broad, so quick definitions and MCQ exposure matter.','Memory hook: idea + customer + execution = business.');
  else if(hay.includes('environment')||hay.includes('sustainable')||hay.includes('ecology')) e=base('Environmental engineering covers natural systems, pollution, sustainability, and impact assessment.','Boards may ask definitions, regulations, and practical environmental responsibility.','Memory hook: engineering decisions have environmental cost.');
  else if(hay.includes('laws')||hay.includes('ethics')||hay.includes('standards')||hay.includes('safety')) e=base('Laws, ethics, standards, and safety define what an ECE may legally and responsibly do.','This is memorization-heavy but high-value because wrong choices are often obvious after review.','Memory hook: competence plus responsibility equals professional practice.');
  else if(hay.includes('cad')||hay.includes('drawing')) e=base('CAD is computer-aided drawing: precise digital drafting using layers, snaps, dimensions, plotting, and references.','It is practical and newer in the scope, so basic tool vocabulary matters.','Memory hook: snaps make drawings accurate; layers make drawings organized.');
  else if(hay.includes('physics')||hay.includes('mechanics')||hay.includes('waves')||hay.includes('optics')||hay.includes('thermodynamics')) e=base('Physics topics explain motion, energy, waves, heat, light, electricity, and matter using equations and concepts.','GEAS physics can be broad, so identify the quantity being asked before choosing a formula.','Memory hook: units often reveal the formula.');
  else e=base(q.item+' is a board-exam subtopic under '+q.chapter+'. Focus on the definition, the main formula or rule, and the most common trap.','This course treats it as a quest so you do not skip small topics that can become easy points.','Memory hook: define it, solve one example, write one mistake to avoid.');
  return e;
}

   if(review) review.onclick=()=>{state.lastReviewed=state.lastReviewed||{};state.reviewCount=state.reviewCount||{};state.lastReviewed[id]=todayISO();state.reviewCount[id]=(state.reviewCount[id]||0)+1;recordActivity('reviews');save();showToast('🧠 Reviewed. This is how memory gets stronger.');render();};
   if(weak) weak.onclick=()=>{state.weak[id]=!state.weak[id];if(!state.weak[id])delete state.weak[id];save();render();};
 });
 document.querySelectorAll('.memoryDone').forEach(cb=>{
   cb.onchange=e=>{state.memoryDone=state.memoryDone||{};state.memoryDone[e.target.dataset.qid]=e.target.checked;if(e.target.checked){showToast('🧠 Memory spell locked. Now prove it with the tasks.');}else delete state.memoryDone[e.target.dataset.qid];save();maybeCompleteQuestFromTasks(e.target);renderSidebar();};
 });
 document.querySelectorAll('.solutionDone').forEach(cb=>{
   cb.onchange=e=>{state.solutionDone=state.solutionDone||{};state.solutionDone[e.target.dataset.qid]=e.target.checked;if(e.target.checked){showToast('✅ Solution understood. That is better than memorizing the final answer.');}else delete state.solutionDone[e.target.dataset.qid];save();maybeCompleteQuestFromTasks(e.target);renderSidebar();};
 });
 document.querySelectorAll('.practiceDone').forEach(cb=>{
   cb.onchange=e=>{state.practiceDone=state.practiceDone||{};state.practiceDone[e.target.dataset.rid]=e.target.checked;if(e.target.checked){recordActivity('practice');showToast('📝 Practice scroll sealed. Keep going.');}else delete state.practiceDone[e.target.dataset.rid];save();maybeCompleteQuestFromTasks(e.target);renderSidebar();};
 });
 document.querySelectorAll('.videoDone').forEach(cb=>{
   cb.onchange=e=>{state.videoDone=state.videoDone||{};state.videoDone[e.target.dataset.vid]=e.target.checked;if(e.target.checked){recordActivity('practice');showToast('🌀 Pensieve refresher sealed. Now finish the scroll.');}else delete state.videoDone[e.target.dataset.vid];save();maybeCompleteQuestFromTasks(e.target);renderSidebar();};
 });
 document.querySelectorAll('.topicNote').forEach(tb=>{
   tb.oninput=e=>{state.topicNotes=state.topicNotes||{};state.topicNotes[e.target.dataset.id]=e.target.value;save();};

function renderNew(){const el=document.getElementById('view-new');let n=quests.filter(q=>q.nt);let by={};n.forEach(q=>{by[q.subjectTitle]=by[q.subjectTitle]||[];by[q.subjectTitle].push(q)});el.innerHTML=`<div class="contentHead"><h2>New / Weak Areas</h2></div>`+Object.keys(by).map((sub,idx)=>`<details class="chapter" ${idx===0?'open':''}><summary class="chapterHead"><div><h3>${sub}</h3><div class="small">${by[sub].length} gap quests</div></div><span class="badge bad">New</span></summary><div class="questList">${by[sub].map(q=>questHTML(q)).join('')}</div></details>`).join('');bindQuestEvents();}
function renderMock(){const el=document.getElementById('view-mock');el.innerHTML=`<div class="contentHead"><h2>Mock Board Training Plan</h2><p class="small">This is the non-negotiable part. Reading feels productive, but boards are passed by retrieval, speed, and error correction.</p></div><div class="tableWrap"><table><thead><tr><th>Phase</th><th>Target</th><th>Quest rule</th><th>Pass condition</th></tr></thead><tbody>
<tr><td><b>Phase 1: Diagnostic</b></td><td>All subjects</td><td>20 mixed questions per subject, no notes.</td><td>Make a weakness list. No shame, just data.</td></tr>
<tr><td><b>Phase 2: New Audit</b></td><td>BMS/HVAC, Technopreneurship, Management, OOP/UML, CAD, Environment, Data security</td><td>Finish all New quests once.</td><td>Can explain each topic in 3-5 sentences and answer basic MCQs.</td></tr>
<tr><td><b>Phase 3: Core Recovery</b></td><td>Math, circuits, comms, signals, control</td><td>Timed 10-question sets. Review wrong answers immediately.</td><td>70%+ per set before moving on.</td></tr>
<tr><td><b>Phase 4: Weighted Mocks</b></td><td>20/30/20/30 distribution</td><td>Simulate subject weights instead of equal chapters.</td><td>Consistent 75%+ with time pressure.</td></tr>
<tr><td><b>Phase 5: Final Month</b></td><td>Weak items only</td><td>Repeat weak-marked quests and formula drills.</td><td>No repeated mistakes for 7 days.</td></tr>
</tbody></table></div><div class="callout"><b>Anti-failure rule:</b> every wrong answer must become a tiny flashcard: concept, formula, trap, correct method. Do not just write the final answer.</div>`;}

function renderPractice(){

 el.innerHTML=`<div class="contentHead"><h2>Exact PinoyBIX Practice</h2><p class="small">Suggested target: 8 MCQs for light topics, 12 for core/high-yield topics, 15 for New or Weak topics. If below 70%, do one more short set.</p></div>`+Object.keys(groups).map(g=>`<div class="chapter"><div class="chapterHead"><div><h3>${g}</h3><div class="small">${groups[g].length} exact practice resources</div></div></div><div class="questList">${groups[g].map(r=>{const rid=resourceId(r);return `<div class="quest practiceResourceRow ${state.practiceDone&&state.practiceDone[rid]?'done':''}"><input type="checkbox" class="practiceDone" data-rid="${rid}" ${state.practiceDone&&state.practiceDone[rid]?'checked':''}/><div><div class="questTitle">${r.title}</div><div class="questText">Suggested: 10–15 MCQs. Matching keywords: ${(r.match||[]).slice(0,6).join(', ')}</div><div class="practiceLinks"><a class="practiceLink" href="${r.url}" target="_blank" rel="noopener">Open and practice now</a></div></div><div class="xp">${state.practiceDone&&state.practiceDone[rid]?'✓':'↗'}</div></div>`}).join('')}</div></div>`).join('');
 bindQuestEvents();
}

function renderReview(){
 const el=document.getElementById('view-review');
 const done=quests.filter(q=>state.done&&state.done[q.id]);
 const due=done.filter(q=>reviewStatus(q.id).due);
 const soon=done.filter(q=>reviewStatus(q.id).soon);
 const fresh=done.filter(q=>!reviewStatus(q.id).due && !reviewStatus(q.id).soon);
 function block(title,arr,badge){return `<div class="chapter"><div class="chapterHead"><div><h3>${title}</h3><div class="small">${arr.length} lessons</div></div><span class="badge ${badge||''}">spaced review</span></div><div class="questList">${arr.length?arr.map(q=>questHTML(q)).join(''):'<div class="callout">Nothing here right now.</div>'}</div></div>`}
 el.innerHTML=`<div class="contentHead"><h2>Review Tracker</h2><p class="small">When you tick a lesson as finished, the app records the finish date. Use Reviewed after you revisit it. The next review spacing is 1, 3, 7, 14, 30, then 60 days.</p></div><div class="callout"><b>Better retention rule:</b> do not wait until you forget everything. Review due items first, especially weak topics and calculation drills.</div>`+block('Due now',due,'bad')+block('Coming soon',soon,'warn')+block('Not due yet',fresh,'good');

function weakTopicsHTML(){
 const weakQs=quests.filter(q=>state.weak[q.id]);
 if(!weakQs.length) return `<div class="callout"><b>⚠️ Dark Arts list:</b> none marked yet. Use the Weak button inside any quest.</div>`;
 let by={};
 weakQs.forEach(q=>{by[q.subjectTitle]=by[q.subjectTitle]||[];by[q.subjectTitle].push(q);});
 return `<div class="callout"><b>⚠️ Dark Arts list</b><div class="small">These are the spells that still fight back. Revisit them until they feel automatic.</div></div>`+
 Object.keys(by).map(sub=>`<details class="chapter" open><summary class="chapterHead"><div><h3>${sub}</h3><div class="small">${by[sub].length} weak topic${by[sub].length===1?'':'s'}</div></div><span class="badge purple">Weak</span></summary><div class="weakList">`+
 by[sub].map(q=>`<div class="weakItem"><div><b>${q.item}</b><div class="small">${q.chapter}${state.topicNotes?.[q.id]?` • Note: ${escapeHTML(state.topicNotes[q.id]).slice(0,120)}${state.topicNotes[q.id].length>120?'...':''}`:''}</div></div><button class="secondary openWeakBtn" data-id="${q.id}" style="padding:6px 9px;font-size:12px">Open</button></div>`).join('')+
 `</div></details>`).join('');
}
function renderNotes(){
 const el=document.getElementById('view-notes');
 const backupBox=`<div class="card backupCard"><h3>🛜 Floo Network Save</h3><p class="small">Export your progress scroll before changing browser, phone, or file location. Includes memory, solution, video, and practice checkboxes.</p><div class="two"><button class="secondary" id="exportBtn">⬇️ Export Scroll</button><label class="secondary" style="text-align:center;cursor:pointer">⬆️ Import Scroll<input type="file" id="importFile" class="hidden" accept="application/json" /></label></div><div id="backupStatus" class="small" style="min-height:18px;margin-top:6px"></div><button class="danger" id="resetBtn" style="margin-top:8px">🧹 Reset Progress</button></div>`;
 el.innerHTML=`<div class="contentHead"><h2>📖 Common Room</h2><p class="small">Dark Arts list, study journal, and save tools.</p></div>${backupBox}${weakTopicsHTML()}<textarea id="notesBox" class="notes" placeholder="Mistakes, formulas, mnemonics, weak spells, review reminders...">${state.notes||''}</textarea><div style="margin-top:10px"><button class="primary" id="saveNotes">💾 Save Journal</button></div>`;
 document.getElementById('saveNotes').onclick=()=>{state.notes=document.getElementById('notesBox').value;save();alert('Journal saved.');};
 document.querySelectorAll('.openWeakBtn').forEach(btn=>btn.onclick=()=>{const q=quests.find(x=>x.id===btn.dataset.id);if(!q)return;state.subject=q.subject;state.filter='weak';state.view='quests';save();render();});
 attachBackupHandlers();
}
function render(){renderSidebar();document.querySelectorAll('section[id^="view-"]').forEach(x=>x.classList.add('hidden'));document.getElementById('view-'+state.view).classList.remove('hidden');
document.addEventListener('toggle',e=>{if(e.target.matches('.lessonDrawer')&&e.target.open){document.querySelectorAll('.lessonDrawer[open]').forEach(d=>{if(d!==e.target)d.open=false;});}},true);
document.addEventListener('toggle',e=>{if(e.target.matches('details.chapter')&&e.target.open&&window.matchMedia('(max-width:900px)').matches){const parent=e.target.parentElement;const cls=e.target.classList.contains('subjectGroup')?'subjectGroup':(e.target.classList.contains('innerChapter')?'innerChapter':'chapter');parent.querySelectorAll(':scope > details.'+cls+'[open]').forEach(d=>{if(d!==e.target)d.open=false;});}},true);

document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));document.querySelectorAll('#mobileStickyNav button').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));if(state.view==='map')renderMap();if(state.view==='quests')renderQuests();if(state.view==='new')renderNew();if(state.view==='mock')renderMock();if(state.view==='practice')renderPractice();if(state.view==='review')renderReview();if(state.view==='notes')renderNotes();}
load();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.view=t.dataset.view;save();render();});
document.querySelectorAll('#mobileStickyNav button').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;save();render();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('search').oninput=()=>{state.view='quests';render();};
document.getElementById('filter').onchange=()=>{const f=document.getElementById('filter').value;state.view=f==='new'?'new':(f==='due'?'review':'quests');render();};
function backupPayload(){return {app:'ECE Board Review 2026 Quest Map',version:'2026-clean-practice-targets-v6',exportedAt:new Date().toISOString(),state:{...state}};}
function setBackupStatus(msg){const el=document.getElementById('backupStatus');if(el)el.textContent=msg;}
function attachBackupHandlers(){
 const exportBtn=document.getElementById('exportBtn');
 const importFile=document.getElementById('importFile');
 const resetBtn=document.getElementById('resetBtn');
 if(exportBtn)exportBtn.onclick=()=>{const payload=backupPayload();let blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ece_board_review_progress_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);setBackupStatus('Exported. Keep the JSON file safe.');};
 if(importFile)importFile.onchange=e=>{let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{const incoming=JSON.parse(r.result);const importedState=incoming.state?incoming.state:incoming;state={...state,...importedState,done:{...(state.done||{}),...(importedState.done||{})},completedAt:{...(state.completedAt||{}),...(importedState.completedAt||{})},lastReviewed:{...(state.lastReviewed||{}),...(importedState.lastReviewed||{})},reviewCount:{...(state.reviewCount||{}),...(importedState.reviewCount||{})},weak:{...(state.weak||{}),...(importedState.weak||{})},practiceDone:{...(state.practiceDone||{}),...(importedState.practiceDone||{})},videoDone:{...(state.videoDone||{}),...(importedState.videoDone||{})},topicNotes:{...(state.topicNotes||{}),...(importedState.topicNotes||{})},memoryDone:{...(state.memoryDone||{}),...(importedState.memoryDone||{})},solutionDone:{...(state.solutionDone||{}),...(importedState.solutionDone||{})},practiceQuestDone:{...(state.practiceQuestDone||{}),...(importedState.practiceQuestDone||{})},notes:importedState.notes!==undefined?importedState.notes:(state.notes||'')};save();render();state.view='notes';save();render();setBackupStatus('Imported.');alert('Progress imported.');}catch(err){setBackupStatus('Import failed.');alert('Import failed. This is not a valid backup file.');}finally{e.target.value='';}};r.readAsText(file);};
 if(resetBtn)resetBtn.onclick=()=>{if(confirm('Reset all progress and weak marks?')){state={done:{},completedAt:{},lastReviewed:{},reviewCount:{},weak:{},practiceDone:{},videoDone:{},topicNotes:{},memoryDone:{},solutionDone:{},practiceQuestDone:{},activityDates:{},daily:{},dailyTarget:3,subject:'all',view:'map',notes:''};save();render();}};
}
render();
</script>

<script id="hp-gameplus-script">
(function(){
  if(window.__hpGamePlusLoaded) return;
  window.__hpGamePlusLoaded = true;

  const HOUSE_META = {
    math:{name:'Ravenclaw', icon:'🦅', room:'Ravenclaw Tower', boss:'The Arithmancy Dragon', challenge:'Finish 3 mixed math problems from different chapters in one timed 35-minute burst. Show full solutions from memory.'},
    ee:{name:'Gryffindor', icon:'🦁', room:'Gryffindor Tower', boss:'The Circuit Chimera', challenge:'Solve one circuits problem, one electronics device problem, and explain one design concept aloud without notes.'},
    geas:{name:'Hufflepuff', icon:'🦡', room:'Hufflepuff Basement', boss:'The GEAS Troll', challenge:'Answer 20 mixed GEAS items in one sitting and write the 5 you keep forgetting.'},
    est:{name:'Slytherin', icon:'🐍', room:'Slytherin Dungeon', boss:'The Signal Basilisk', challenge:'Do one communications set, one transmission/antenna set, and summarize the key formulas from memory.'}
  };

  state.bossDone = state.bossDone || {};
  state.claimedRewards = state.claimedRewards || {};
  state.unlockedAchievements = state.unlockedAchievements || {};
  state.solutionDone = state.solutionDone || {};
  state.practiceQuestDone = state.practiceQuestDone || {};
  save();

  levelTitle = function(level){
    if(level<3) return 'First Year';
    if(level<6) return 'Second Year';
    if(level<9) return 'Prefect';
    if(level<12) return 'Head Student';
    if(level<15) return 'Auror Trainee';
    return 'Order of Merlin';
  };
  motivationalLine = function(s){
    if(s.done===0) return 'Start with one small spell. Momentum beats mood.';
    if(s.streak>=7) return 'Your magic is stable. Protect the streak and keep casting.';
    if(s.today.quests >= (state.dailyTarget||3)) return 'Daily target cleared. Bonus points if you review one weak spell.';
    return 'Clear one spell, then one more. That is how wizards pass boards.';
  };

  function subjectStats(id){
    const qs = quests.filter(q=>q.subject===id);
    const done = qs.filter(q=>state.done[q.id]).length;
    const weak = qs.filter(q=>state.weak[q.id]).length;
    const reviewed = qs.filter(q=>state.lastReviewed && state.lastReviewed[q.id]).length;
    return {total:qs.length,done,weak,reviewed,pct:qs.length?Math.round(done/qs.length*100):0,bossDone:!!state.bossDone[id]};
  }

  function achievements(){
    const doneCount = quests.filter(q=>state.done[q.id]).length;
    const reviewCount = Object.keys(state.lastReviewed||{}).length;
    const practiceCount = Object.keys(state.practiceDone||{}).filter(k=>state.practiceDone[k]).length;
    const videoCount = Object.keys(state.videoDone||{}).filter(k=>state.videoDone[k]).length;
    const streak = currentStreak();
    const fullSubjects = subjects.filter(s=>subjectStats(s.id).done===subjectStats(s.id).total && subjectStats(s.id).total>0).length;
    const bossWins = subjects.filter(s=>state.bossDone[s.id]).length;
    return [
      {id:'first_spell', icon:'✨', name:'First Spell', desc:'Complete your first quest.', unlocked:doneCount>=1},
      {id:'pensieve', icon:'🌀', name:'Pensieve Step', desc:'Review any completed spell once.', unlocked:reviewCount>=1},
      {id:'duelist', icon:'⚔️', name:'Dueling Start', desc:'Finish 5 practice scrolls.', unlocked:practiceCount>=5},
      {id:'owlwatch', icon:'🎥', name:'Pensieve Watcher', desc:'Watch 5 refresher videos.', unlocked:videoCount>=5},
      {id:'streak3', icon:'🔥', name:'Streak of 3', desc:'Study 3 days in a row.', unlocked:streak>=3},
      {id:'streak7', icon:'🧨', name:'Streak of 7', desc:'Study 7 days in a row.', unlocked:streak>=7},
      {id:'houseclear', icon:'🏰', name:'House Clear', desc:'Finish every quest in one subject.', unlocked:fullSubjects>=1},
      {id:'bosswin', icon:'🐉', name:'Boss Winner', desc:'Defeat one subject boss battle.', unlocked:bossWins>=1},
      {id:'scholar25', icon:'📚', name:'Scholar 25', desc:'Master 25 quests total.', unlocked:doneCount>=25},
      {id:'legend50', icon:'👑', name:'Legend 50', desc:'Master 50 quests total.', unlocked:doneCount>=50}
    ];
  }

  function rewardItems(){
    const streak = currentStreak();
    const today = state.daily && state.daily[dayKey()] ? state.daily[dayKey()] : {};
    const dailyMet = (today.quests||0) >= (state.dailyTarget||3);
    return [
      {id:'daily', icon:'🍫', title:'Chocolate Frog', desc:'Clear your daily target.', claimable:dailyMet},
      {id:'streak3', icon:'🧣', title:'House Scarf', desc:'Study 3 days in a row.', claimable:streak>=3},
      {id:'streak7', icon:'🗺️', title:'Map Glow', desc:'Study 7 days in a row.', claimable:streak>=7},
      {id:'streak14', icon:'🦌', title:'Patronus Badge', desc:'Study 14 days in a row.', claimable:streak>=14}
    ];
  }

  function claimReward(id){
    state.claimedRewards[id]=true;
    save();
    if(typeof showToast==='function') showToast('🎁 Reward claimed: '+id.replace('_',' '));
    render();
  }
  window.claimReward = claimReward;

  function toggleBossBattle(subId){
    const st = subjectStats(subId);
    if(st.done < st.total){
      if(typeof showToast==='function') showToast('🔒 Finish the subject quests first to unlock this boss fight.');
      return;
    }
    state.bossDone[subId] = !state.bossDone[subId];
    save();
    if(typeof showToast==='function') showToast(state.bossDone[subId] ? '🐉 Boss defeated! House points earned.' : 'Boss battle reset.');
    render();
  }
  window.toggleBossBattle = toggleBossBattle;

  function injectSidebarExtras(){
    const sidebar = document.querySelector('.sidebar');
    if(!sidebar) return;
    sidebar.querySelectorAll('.gamePlusBlock').forEach(el=>el.remove());
    if(state.view !== 'map') return;

    const ach = achievements();
    const rewards = rewardItems();
    const houses = subjects.map(s=>{
      const m=HOUSE_META[s.id], st=subjectStats(s.id);
      return `<div class="houseItem"><b>${m.icon} ${m.name}</b><div class="small">${m.room}</div><div class="housePoints"><span>${s.title}</span><span>${st.done}/${st.total}</span></div></div>`;
    }).join('');

    const rewardHtml = rewards.map(r=>{
      const claimed = !!state.claimedRewards[r.id];
      return `<div class="rewardItem ${r.claimable && !claimed ? 'claimable':''}"><b>${r.icon} ${r.title}</b><small>${r.desc}</small>${claimed?'<div class="small">✅ Claimed</div>':(r.claimable?`<button class="primary claimBtn" onclick="claimReward('${r.id}')">Claim reward</button>`:'<div class="small">Locked</div>')}</div>`;
    }).join('');

    const achHtml = ach.map(a=>`<div class="achItem ${a.unlocked?'':'locked'}"><div class="achName">${a.icon} ${a.name}</div><div class="achDesc">${a.desc}</div><div class="small">${a.unlocked?'Unlocked':'Locked'}</div></div>`).join('');

    const anchor = sidebar.querySelector('.controls') || sidebar.lastElementChild;
    if(!anchor) return;

    anchor.insertAdjacentHTML('beforebegin', `
      <div class="gamePlusBlock rewardPanel"><h3>🎁 Rewards</h3><div class="rewardGrid">${rewardHtml}</div></div>
      <div class="gamePlusBlock achievePanel"><h3>🏅 Achievement Wall</h3><div class="achieveGrid">${achHtml}</div></div>
      <div class="gamePlusBlock housePanel"><h3>🏰 Houses</h3><div class="houseGrid">${houses}</div></div>
    `);

    document.querySelectorAll('.subjectList .chapterBtn').forEach(btn=>{
      const sid = btn.dataset.subject || btn.dataset.id || btn.getAttribute('data-subject');
      if(!sid || !HOUSE_META[sid]) return;
      if(btn.classList.contains('houseSubjectBtn')) return;
      const meta = HOUSE_META[sid];
      btn.classList.add('houseSubjectBtn');
      const base = btn.textContent.trim();
      btn.innerHTML = `${meta.icon} ${base}<span class="houseSub">${meta.name}</span>`;
    });
  }

  function houseMapSections(){
    const full = subjects.filter(s=>{
      const st=subjectStats(s.id);
      return st.total && st.done===st.total;
    });
    if(!full.length) return '';
    return `<div class="victoryPanel gamePlusBlock"><h3>🏆 Hall of Victors</h3><div class="victoryGrid">${
      full.map(s=>{
        const m=HOUSE_META[s.id], st=subjectStats(s.id);
        return `<div class="victoryItem"><b>${m.icon} ${s.title}</b><div class="small">${m.name} completed • ${st.bossDone?'Boss defeated':'Boss not yet defeated'}</div></div>`;
      }).join('')
    }</div></div>`;
  }

  function enhanceMapView(){
    const map = document.getElementById('view-map');
    if(!map || map.classList.contains('hidden')) return;
    map.querySelectorAll('.gamePlusTop').forEach(el=>el.remove());
    const intro = `
      <div class="gamePlusTop">
        ${houseMapSections()}
      </div>`;
    map.insertAdjacentHTML('afterbegin', intro);

    const cards = Array.from(map.querySelectorAll('.mapCard'));
    cards.forEach((card, idx)=>{
      const s = subjects[idx];
      if(!s) return;
      const meta = HOUSE_META[s.id], st=subjectStats(s.id);
      if(!card.querySelector('.houseRibbon')){
        card.insertAdjacentHTML('afterbegin', `<div class="houseRibbon">${meta.icon} ${meta.name} • ${meta.room}</div>`);
      }
      const btnArea = card.querySelector('.mapOpenBtn') ? card.querySelector('.mapOpenBtn').parentElement : card;
      if(!card.querySelector('.subjectMiniBoss')){
        btnArea.insertAdjacentHTML('beforeend', `
          <div class="subjectMiniBoss ${st.bossDone?'bossDone':''}">
            <div class="small"><b>Boss:</b> ${meta.boss}</div>
            <div class="houseBtnNote">${st.done===st.total ? (st.bossDone?'✅ Defeated':'Unlocked now') : `Unlock at ${st.total}/${st.total} cleared`}</div>
            <button class="secondary bossButton" onclick="toggleBossBattle('${s.id}')">${st.bossDone?'Reset boss':(st.done===st.total ? 'Defeat boss' : 'Locked')}</button>
          </div>`);
      } else {
        const wrap = card.querySelector('.subjectMiniBoss');
        wrap.classList.toggle('bossDone', st.bossDone);
        wrap.querySelector('.houseBtnNote').textContent = st.done===st.total ? (st.bossDone?'✅ Defeated':'Unlocked now') : `Unlock at ${st.total}/${st.total} cleared`;
        wrap.querySelector('.bossButton').textContent = st.bossDone?'Reset boss':(st.done===st.total ? 'Defeat boss' : 'Locked');
      }
    });
  }

  function enhanceQuestView(){
    const view = document.getElementById('view-quests');
    if(!view || view.classList.contains('hidden')) return;
    const groups = Array.from(view.querySelectorAll('details.subjectGroup'));
    groups.forEach(group=>{
      const titleEl = group.querySelector('.subjectHead h3');
      if(!titleEl) return;
      const sub = subjects.find(s=>s.title===titleEl.textContent.trim());
      if(!sub) return;
      const meta=HOUSE_META[sub.id], st=subjectStats(sub.id);
      if(!group.querySelector('.houseRibbon')){
        titleEl.insertAdjacentHTML('beforebegin', `<div class="houseRibbon questHouseTag">${meta.icon} ${meta.name} • ${meta.room}</div>`);
      }
      group.querySelectorAll('.bossPanel,.victoryBanner').forEach(el=>el.remove());
      const bossHtml = `
        ${st.done===st.total?`<div class="victoryBanner"><div><b>🏆 ${sub.title} cleared</b><div class="small">All regular spells in this house are complete. ${st.bossDone?'Boss already defeated.':'Boss battle is ready.'}</div></div><div class="badge ${st.bossDone?'good':'warn'}">${st.bossDone?'House Cup Won':'Boss Ready'}</div></div>`:''}
        <div class="bossPanel ${st.bossDone?'bossDone':''}">
          <h3>🐉 Boss Battle — ${meta.boss}</h3>
          <div class="small">${meta.challenge}</div>
          <div class="bossLock">${st.done===st.total ? 'Unlocked. Defeat this boss after clearing the subject.' : `Locked until you clear all ${st.total} subject quests.`}</div>
          <button class="primary bossButton" onclick="toggleBossBattle('${sub.id}')">${st.bossDone?'Reset boss battle':(st.done===st.total?'Mark boss defeated':'Locked')}</button>
        </div>`;
      group.insertAdjacentHTML('beforeend', bossHtml);
    });
  }

  function enhanceNotesView(){
    const notes = document.getElementById('view-notes');
    if(!notes || notes.classList.contains('hidden')) return;
    notes.querySelectorAll('.gamePlusCommon').forEach(el=>el.remove());
    const ach = achievements().filter(a=>a.unlocked);
    notes.insertAdjacentHTML('afterbegin', `<div class="gamePlusCommon victoryPanel"><h3>✨ Wizard Record</h3><div class="small">Unlocked ${ach.length} achievements • Boss wins: ${subjects.filter(s=>state.bossDone[s.id]).length}</div></div>`);
  }

  const __oldRender = render;
  render = function(){
    __oldRender();
    try{
      injectSidebarExtras();
      enhanceMapView();
      enhanceQuestView();
      enhanceNotesView();
    }catch(err){
      console.error(err);
    }
  };

  render();
})();
</script>


<script id="topic-variety-patch-v1">
(function(){
  if(window.__topicVarietyPatchLoaded) return;
  window.__topicVarietyPatchLoaded = true;

  const oldTopicExplainer = typeof topicExplainer === 'function' ? topicExplainer : null;

  function variedTopicExplainer(q){
    const subject = (q.subjectTitle || '').toLowerCase();
    const chapter = (q.chapter || '').toLowerCase();
    const item = (q.item || '').toLowerCase();
    const hay = subject + ' ' + chapter + ' ' + item;
    const base = (what, why, hook) => ({what, why, hook});

    if(chapter.includes('dc electrical circuits')){
      if(item.includes('resistive network')){
        return base(
          'Resistive networks are combinations of resistors connected in series, parallel, bridge, or mixed forms.',
          'Board problems usually ask you to reduce the network, find equivalent resistance, then compute voltage, current, or power.',
          'Memory hook: simplify the circuit first; calculate second.'
        );
      }
      if(item.includes('mesh') || item.includes('node')){
        return base(
          'Mesh and node equations are organized circuit-solving methods: mesh uses KVL around loops, while nodal uses KCL at nodes.',
          'They are useful when a circuit cannot be reduced cleanly by simple series-parallel shortcuts.',
          'Memory hook: node = current balance; mesh = voltage balance.'
        );
      }
      if(item.includes('network theorem')){
        return base(
          'Network theorems such as Thevenin, Norton, superposition, and maximum power transfer turn a messy circuit into a simpler equivalent.',
          'They save time in load problems and help you avoid solving the whole circuit repeatedly.',
          'Memory hook: replace the messy part with one useful equivalent.'
        );
      }
      if(item.includes('transient')){
        return base(
          'Transient analysis studies what happens just after switching in RC, RL, or RLC circuits before the circuit reaches steady state.',
          'Boards often test time constants, initial/final values, and exponential charging or decay.',
          'Memory hook: capacitor voltage and inductor current do not jump instantly.'
        );
      }
      if(item.includes('problem drill')){
        return base(
          'DC network drills are mixed practice sets using Ohm’s law, Kirchhoff laws, power formulas, and equivalent resistance.',
          'The goal is speed and accuracy: identify the circuit type, choose the method, then solve without overthinking.',
          'Memory hook: draw currents and polarities before writing equations.'
        );
      }
    }

    if(chapter.includes('ac electrical circuits')){
      if(item.includes('impedance') || item.includes('admittance')){
        return base(
          'Impedance is AC resistance with phase; admittance is its reciprocal. Both use complex numbers.',
          'This is the entry point for phasor circuit solving and AC power calculations.',
          'Memory hook: impedance blocks current; admittance lets current through.'
        );
      }
      if(item.includes('resonance')){
        return base(
          'Resonance happens when inductive and capacitive reactances cancel, leaving the circuit most resistive.',
          'Board questions often ask for resonant frequency, bandwidth, Q, or current and voltage behavior.',
          'Memory hook: at resonance, XL and XC cancel.'
        );
      }
      if(item.includes('power')){
        return base(
          'AC power has real, reactive, and apparent parts, linked by the power triangle and power factor.',
          'This matters because AC loads may draw current without converting all of it into useful work.',
          'Memory hook: watts do work; vars swing energy back and forth.'
        );
      }
      if(item.includes('two-port') || item.includes('transfer')){
        return base(
          'Two-port networks describe circuits using input-output relationships such as impedance, admittance, hybrid, or transmission parameters.',
          'They help analyze amplifiers, filters, and cascaded networks without redrawing every internal detail.',
          'Memory hook: treat the circuit like a box with input and output behavior.'
        );
      }
    }

    return oldTopicExplainer ? oldTopicExplainer(q) : base(
      (q.item || 'This topic') + ' is a board-exam subtopic under ' + (q.chapter || 'this chapter') + '.',
      'Focus on the definition, main formula or rule, and one common trap.',
      'Memory hook: define it, solve one example, write one mistake to avoid.'
    );
  }

  window.topicExplainer = variedTopicExplainer;
  try { topicExplainer = variedTopicExplainer; } catch(e) {}

  if(typeof render === 'function') render();
})();
</script>

<script id="duolingo-style-path-patch-v1">
(function(){
  if(window.__duolingoStylePathLoaded) return;
  window.__duolingoStylePathLoaded = true;

  state.duo = state.duo || {hearts:5,gems:0,lastHeartDay:dayKey(),chests:{}};
  function syncDuo(){
    state.duo = state.duo || {};
    const today = dayKey();
    if(state.duo.lastHeartDay !== today){ state.duo.hearts = 5; state.duo.lastHeartDay = today; }
    if(typeof state.duo.hearts !== 'number') state.duo.hearts = 5;
    if(typeof state.duo.gems !== 'number') state.duo.gems = 0;
    state.duo.chests = state.duo.chests || {};
  }
  function escDuo(x){ return typeof escHTML==='function' ? escHTML(x) : String(x||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function qListForSubject(subId){ return quests.filter(q=>q.subject===subId); }
  function firstUnlockedQuest(){
    for(const sub of subjects){
      const arr=qListForSubject(sub.id);
      for(let i=0;i<arr.length;i++){
        const prev=i===0 || state.done[arr[i-1].id];
        if(prev && !state.done[arr[i].id]) return arr[i];
      }
    }
    return quests.find(q=>!state.done[q.id]) || quests[0];
  }
  function lessonNumber(q){ return qListForSubject(q.subject).findIndex(x=>x.id===q.id)+1; }
  function focusQuest(qid){
    const q=quests.find(x=>x.id===qid); if(!q) return;
    state.subject=q.subject; state.filter='all'; state.view='quests'; state.focusQuest=qid; save(); render();
    setTimeout(()=>{
      const row=document.querySelector(`.quest[data-id="${qid}"]`);
      if(row){ row.classList.add('duoFocused'); const drawer=row.querySelector('.lessonDrawer'); if(drawer) drawer.open=true; row.scrollIntoView({behavior:'smooth',block:'center'}); }
    },80);
  }
  window.duoFocusQuest = focusQuest;

  const oldRenderMission = renderMission;
  renderMission = function(s){
    syncDuo();
    const el=document.getElementById('dailyMission'); if(!el){ if(oldRenderMission) oldRenderMission(s); return; }
    const target=state.dailyTarget||3;
    const qDone=s.today.quests||0;
    const due=quests.filter(q=>state.done[q.id]&&reviewStatus(q.id).due).length;
    const progress=Math.min(100,(qDone/target)*100);
    const next=firstUnlockedQuest();
    const hearts='❤️'.repeat(Math.max(0,state.duo.hearts))+'🤍'.repeat(Math.max(0,5-state.duo.hearts));
    el.innerHTML=`<div class="missionCard compactMission hpMission duoMission"><div class="missionHeader"><b>🦉 Daily Lesson</b><span>${qDone}/${target}</span></div><div class="miniBar"><div style="width:${progress}%"></div></div><div class="missionMini"><span title="Hearts refill daily">${hearts}</span><span>💎 ${state.duo.gems||0}</span><span>🔥 ${s.streak} day streak</span></div><div class="miniAction"><select id="targetSelect"><option value="1" ${target===1?'selected':''}>1 lesson</option><option value="3" ${target===3?'selected':''}>3 lessons</option><option value="5" ${target===5?'selected':''}>5 lessons</option></select><button class="primary pulseBtn" id="nextActionBtn">${due?'🌀 Review':'▶️ Start'}</button></div><div class="small" style="margin-top:6px">Next: ${next?escDuo(next.item):'All lessons cleared'}</div></div>`;
    const sel=document.getElementById('targetSelect'); if(sel) sel.onchange=e=>{state.dailyTarget=parseInt(e.target.value,10);save();render();};
    const btn=document.getElementById('nextActionBtn'); if(btn) btn.onclick=()=>{ if(due){state.view='review';save();render();} else if(next) focusQuest(next.id); };
  };

  const oldRenderMap = renderMap;
  renderMap = function(){
    syncDuo();
    const el=document.getElementById('view-map'); if(!el){ if(oldRenderMap) oldRenderMap(); return; }
    const s=stats(); const next=firstUnlockedQuest();
    const dailyTarget=state.dailyTarget||3;
    const dailyDone=s.today.quests||0;
    const dailyPct=Math.min(100,Math.round(dailyDone/dailyTarget*100));
    const hearts='❤️'.repeat(Math.max(0,state.duo.hearts))+'🤍'.repeat(Math.max(0,5-state.duo.hearts));
    const unitHtml=subjects.map(sub=>{
      const arr=qListForSubject(sub.id); const done=arr.filter(q=>state.done[q.id]).length;
      const firstUndone=arr.find(q=>!state.done[q.id]);
      const open=(state.subject===sub.id || (firstUndone && next && firstUndone.id===next.id) || done===0)?' open':'';
      const nodes=arr.map((q,i)=>{
        const completed=!!state.done[q.id];
        const unlocked=i===0 || !!state.done[arr[i-1].id] || completed;
        const isNext=!completed && unlocked && (!next || q.id===next.id || arr.find(x=>!state.done[x.id])?.id===q.id);
        const cls=completed?'completed':(isNext?'next':(unlocked?'unlocked':'locked'));
        const icon=completed?'✓':(unlocked?(isNext?'▶':'★'):'🔒');
        const badge=q.nt?'New':(q.core?'Core':(state.weak[q.id]?'Weak':'Lesson'));
        return `<div class="duoNode ${cls}" data-id="${q.id}"><button class="duoOrb" ${unlocked?`onclick="duoFocusQuest('${q.id}')"`:'disabled'}>${icon}</button><div><div class="duoLessonTitle">${escDuo(q.item)} <span class="duoLessonBadge">${badge}</span></div><div class="duoLessonMeta">Lesson ${i+1} • ${escDuo(q.chapter)} • +${q.xp} XP</div></div><div class="duoStart">${unlocked?`<button class="${isNext?'primary':'secondary'}" onclick="duoFocusQuest('${q.id}')">${completed?'Review':'Start'}</button>`:'<span class="lockedLabel">Locked</span>'}</div></div>`;
      }).join('');
      const chestReady=done>0 && done%5===0 && !state.duo.chests[sub.id+'_'+done];
      return `<details class="duoUnit"${open}><summary><div><h3>${sub.title}</h3><div class="small">${done}/${arr.length} lessons • ${sub.weight}% exam weight</div></div><div class="badges"><span class="badge ${done===arr.length?'good':'warn'}">${Math.round(done/arr.length*100)}%</span>${chestReady?'<span class="badge warn">Chest</span>':''}</div></summary><div class="duoPath">${nodes}</div>${chestReady?`<div class="duoChest"><div class="duoChestRow"><div><b>🎁 Unit chest ready</b><div class="small">Claim +25 gems for finishing ${done} lessons in this subject.</div></div><button class="primary" onclick="duoClaimChest('${sub.id}',${done})">Claim</button></div></div>`:''}</details>`;
    }).join('');
    el.innerHTML=`<div class="duoHero"><div class="duoHeroTop"><div><h2>Lesson Path</h2><p class="small">Small locked lessons, one visible next step, daily streak, hearts, and gems.</p></div><div class="duoStats"><span class="duoChip hearts">${hearts}</span><span class="duoChip gems">💎 ${state.duo.gems||0}</span><span class="duoChip streak">🔥 ${s.streak}</span><span class="duoChip">⭐ ${s.xp} XP</span></div></div><div class="miniBar"><div style="width:${dailyPct}%"></div></div><div class="duoPathActions"><button class="primary" onclick="duoFocusQuest('${next?next.id:''}')">▶️ Continue lesson</button><button class="secondary" onclick="state.view='review';save();render();">🌀 Review due</button><button class="secondary" onclick="state.view='practice';save();render();">⚔️ Practice</button></div></div><div class="duoPathWrap">${unitHtml}</div>`;
  };

  window.duoClaimChest = function(subId,doneCount){
    syncDuo(); const key=subId+'_'+doneCount; if(state.duo.chests[key]) return;
    state.duo.chests[key]=true; state.duo.gems=(state.duo.gems||0)+25; save();
    if(typeof showToast==='function') showToast('🎁 Chest claimed: +25 gems.');
    render();
  };

  const oldCompleteQuestFromRow = completeQuestFromRow;
  completeQuestFromRow = function(row,id){
    const wasDone = !!(state.done && state.done[id]);
    oldCompleteQuestFromRow(row,id);
    if(!wasDone){ syncDuo(); state.duo.gems=(state.duo.gems||0)+10; save(); }
  };

  const oldBindQuestEvents = bindQuestEvents;
  bindQuestEvents = function(){
    oldBindQuestEvents();
    if(state.focusQuest){
      const row=document.querySelector(`.quest[data-id="${state.focusQuest}"]`);
      if(row){
        row.classList.add('duoFocused');
        if(!row.querySelector('.duoFocusBanner')) row.querySelector('.questTop')?.insertAdjacentHTML('afterend','<div class="duoFocusBanner">▶️ Current lesson — finish the tasks to clear this node.</div>');
        const drawer=row.querySelector('.lessonDrawer'); if(drawer) drawer.open=true;
      }
    }
  };

  const oldMaybeComplete = maybeCompleteQuestFromTasks;
  maybeCompleteQuestFromTasks = function(el){
    const row=el.closest('.quest[data-id]');
    oldMaybeComplete(el);
    if(row && state.done && state.done[row.dataset.id]){ delete state.focusQuest; save(); }
  };

  const oldRender = render;
  render = function(){
    syncDuo();
    oldRender();
    const sb=document.querySelector('.sidebar');
    if(sb && !sb.querySelector('.duoSideMini')){
      sb.insertAdjacentHTML('beforeend',`<div class="duoSideMini"><b>Duolingo mode</b><div class="small">Path nodes lock in order. Finish one lesson at a time. Hearts refill daily; gems reward completed lessons.</div></div>`);
    }
  };

  save();
  render();
})();
</script>

</body>
</html>
